<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Somphea Reak | Bracelet Collection</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Kantumruy+Pro:wght@400;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #faf9f8; -webkit-tap-highlight-color: transparent; }
        .khmer { font-family: 'Kantumruy Pro', sans-serif; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Modern App Tabs */
        .cat-pill { position: relative; color: #64748b; transition: all 0.3s; }
        .cat-pill.active { color: #0f172a; font-weight: 800; transform: scale(1.05); }
        .cat-pill.active::after { content: ''; position: absolute; bottom: -4px; left: 50%; transform: translateX(-50%); width: 20px; height: 3px; background-color: #1a1a1a; border-radius: 4px; }
        
        #modal { transition: transform 0.35s cubic-bezier(0.2, 1, 0.3, 1); transform: translateY(100%); }
        #modal.active { transform: translateY(0); }
        .snap-scroll { scroll-snap-type: x mandatory; }
        .snap-item { scroll-snap-align: start; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.1); background: #22c55e; } 100% { transform: scale(1); } }
        .btn-success { animation: pop 0.4s ease; background: #22c55e !important; }
    </style>
</head>
<body class="pb-6">

    <!-- APP HEADER -->
    <header class="sticky top-0 w-full bg-white/95 backdrop-blur-md z-40 px-4 pt-4 pb-2 shadow-sm">
        <div class="flex items-center justify-between mb-3">
            <div class="flex items-center gap-2.5">
                <div class="w-9 h-9 rounded-full bg-gray-100 flex items-center justify-center overflow-hidden">
                    <img src="/static/image/logo.png" alt="Logo" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/50?text=SR'">
                </div>
                <div class="flex flex-col leading-none">
                    <span class="khmer font-bold text-gray-900 text-sm">សម្ភារៈ</span>
                    <span class="text-[9px] font-black text-gray-400 tracking-widest uppercase mt-0.5">Somphea Reak</span>
                </div>
            </div>
            <button onclick="toggleCart()" class="relative p-2 text-gray-800 hover:text-gray-500 transition-colors">
                <i class="fa-solid fa-bag-shopping text-xl"></i>
                <span id="cart-badge" class="absolute top-1 right-0 bg-red-500 text-white text-[8px] font-black w-4 h-4 rounded-full flex items-center justify-center border-2 border-white shadow-sm transition-transform duration-300">0</span>
            </button>
        </div>

        <div class="flex gap-6 overflow-x-auto hide-scrollbar pb-1 pt-1" id="dynamic-filter-bar"></div>
    </header>

    <main class="max-w-md mx-auto md:max-w-7xl px-3 py-4">
        <div id="grid" class="grid grid-cols-2 md:grid-cols-4 gap-3">
            <div class="col-span-full py-20 flex flex-col items-center justify-center text-gray-300">
                <i class="fa-solid fa-spinner fa-spin text-3xl mb-3 text-black"></i>
                <span class="text-[10px] font-black uppercase tracking-widest">Opening Collection...</span>
            </div>
        </div>
    </main>

    <!-- FULL SCREEN MODAL -->
    <div id="modal" class="fixed inset-0 z-[100] bg-[#faf9f8] flex flex-col hidden">
        <button onclick="closeModal()" class="absolute top-4 left-4 w-10 h-10 bg-black/40 backdrop-blur-md rounded-full flex items-center justify-center text-white z-[110] active:scale-90">
            <i class="fa-solid fa-chevron-left text-sm"></i>
        </button>

        <div id="modal-scroll-area" class="flex-1 overflow-y-auto pb-28 hide-scrollbar"></div>

        <div class="absolute bottom-0 left-0 w-full bg-white border-t border-gray-100 px-4 py-3 pb-8 md:pb-4 shadow-[0_-10px_30px_rgba(0,0,0,0.05)] z-[110] flex gap-3 items-center">
            <div class="flex items-center justify-between bg-gray-100 rounded-full px-4 py-3 w-32 border border-gray-200">
                <button onclick="updateQty(-1)" class="font-black text-gray-500 w-6 active:text-black text-lg leading-none">-</button>
                <span id="modal-qty" class="font-black text-sm">1</span>
                <button onclick="updateQty(1)" class="font-black text-gray-500 w-6 active:text-black text-lg leading-none">+</button>
            </div>
            <button id="add-btn" onclick="addToBag()" class="flex-1 bg-black text-white font-black py-4 rounded-full shadow-xl shadow-gray-300 uppercase text-[11px] tracking-widest active:scale-95 transition-all">
                Add to Bag
            </button>
        </div>
    </div>

    <!-- CART PANEL -->
    <div id="cart" class="fixed inset-y-0 right-0 w-full md:w-96 bg-[#faf9f8] shadow-2xl z-[150] translate-x-full transition-transform duration-300 flex flex-col">
        <div class="p-5 bg-white flex justify-between items-center shadow-sm z-10">
            <h2 class="font-black text-base uppercase tracking-tight">Jewelry Bag</h2>
            <button onclick="toggleCart()" class="w-8 h-8 bg-gray-100 rounded-full flex items-center justify-center text-gray-500 hover:bg-gray-200"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div id="cart-items" class="flex-1 overflow-y-auto p-4 space-y-3"></div>
        <div class="p-5 bg-white shadow-[0_-10px_20px_rgba(0,0,0,0.03)] space-y-3 rounded-t-[24px]">
            <div class="flex justify-between text-xs font-bold text-gray-500"><span>Subtotal</span><span id="side-sub-khr">៛0</span></div>
            <div class="flex justify-between text-xs font-bold text-blue-500"><span>Delivery</span><span id="side-delivery-khr">៛0</span></div>
            <div class="flex justify-between font-black items-end pt-2 border-t border-gray-100">
                <span class="text-xs uppercase">Total</span>
                <div class="text-right">
                    <div id="total-khr" class="text-xl text-black">៛0</div>
                    <div id="total-usd" class="text-[10px] text-gray-400">$0.00</div>
                </div>
            </div>
            <button onclick="toggleCheckout()" class="w-full bg-black text-white font-black py-4 rounded-full shadow-xl shadow-gray-200 uppercase text-[11px] tracking-widest active:scale-95">Secure Checkout</button>
        </div>
    </div>

    <!-- CHECKOUT MODAL -->
    <div id="checkout-modal" class="fixed inset-0 z-[160] flex items-end md:items-center justify-center hidden bg-black/60 backdrop-blur-sm">
        <div class="bg-white w-full max-w-md rounded-t-[32px] md:rounded-[32px] overflow-hidden relative p-6 pt-8 animate-[slideUp_0.3s_ease-out]">
            <button onclick="toggleCheckout()" class="absolute top-4 right-4 w-8 h-8 bg-gray-100 rounded-full flex items-center justify-center text-gray-500"><i class="fa-solid fa-xmark"></i></button>
            <h2 class="text-xl font-black mb-1">Delivery Info</h2>
            <p class="text-[10px] font-bold text-gray-400 mb-5 uppercase tracking-widest">Complete your order</p>
            
            <div class="bg-gray-50 rounded-2xl p-4 border border-gray-100 space-y-2 mb-5">
                <div class="flex justify-between text-[11px] font-bold text-gray-500"><span>Items:</span><span id="check-subtotal">៛0</span></div>
                <div class="flex justify-between text-[11px] font-bold text-blue-600"><span>Shipping:</span><span id="check-delivery">៛0</span></div>
                <div class="flex justify-between text-sm font-black text-gray-900 border-t border-gray-200 pt-2 mt-2"><span>Total:</span><span id="check-total-khr" class="text-black">៛0</span></div>
            </div>
            
            <div class="space-y-3">
                <input type="text" id="cust-name" class="w-full bg-white border border-gray-200 rounded-xl p-3.5 font-bold text-sm outline-none focus:border-black" placeholder="Receiver Name">
                <input type="text" id="cust-phone" class="w-full bg-white border border-gray-200 rounded-xl p-3.5 font-bold text-sm outline-none focus:border-black" placeholder="Phone Number">
                <textarea id="cust-address" rows="2" class="w-full bg-white border border-gray-200 rounded-xl p-3.5 font-bold text-sm outline-none focus:border-black" placeholder="Full Address"></textarea>
                <button onclick="processOrder()" id="confirm-btn" class="w-full bg-black text-white font-black py-4 rounded-xl shadow-lg uppercase text-[11px] tracking-widest active:scale-95 mt-2">Submit Order</button>
            </div>
        </div>
    </div>

    <script>
        let products = [], categories = [], cart = [], currentCat = 'All';
        const RATE = 4000;

        function calculateDelivery(subtotalKHR) {
            if (subtotalKHR === 0) return 0;
            if (subtotalKHR < 20000) return 8000;
            if (subtotalKHR < 40000) return 6000;
            if (subtotalKHR < 60000) return 4000;
            if (subtotalKHR < 80000) return 2000;
            return 0;
        }

        function saveCart() { localStorage.setItem('somphea_reak_cart', JSON.stringify(cart)); }
        function loadCart() {
            const saved = localStorage.getItem('somphea_reak_cart');
            if(saved) { cart = JSON.parse(saved); updateCartUI(); }
        }

        async function loadStore() {
            try {
                const res = await fetch('/api/products/bracelet');
                const data = await res.json();
                products = data.products || []; categories = data.categories || [];
                loadCart(); buildFilters(); render();
            } catch (e) { document.getElementById('grid').innerHTML = '<div class="col-span-full py-10 text-center font-bold text-red-500">Error loading. Refresh page.</div>'; }
        }

        function buildFilters() {
            const bar = document.getElementById('dynamic-filter-bar');
            bar.innerHTML = `<button onclick="filter('All')" class="cat-pill ${currentCat === 'All' ? 'active' : ''} text-[11px] font-bold whitespace-nowrap px-1">Discover</button>`;
            categories.forEach(cat => {
                if(cat.name) bar.innerHTML += `<button onclick="filter('${cat.name}')" class="cat-pill ${currentCat === cat.name ? 'active' : ''} text-[11px] font-bold whitespace-nowrap px-1">${cat.name}</button>`;
            });
        }
        function filter(c) { currentCat = c; buildFilters(); render(); }

        function render() {
            const grid = document.getElementById('grid');
            const data = currentCat === 'All' ? products : products.filter(p => p.category === currentCat);
            grid.innerHTML = data.length ? '' : '<div class="col-span-full py-20 text-center text-gray-400 font-bold text-xs uppercase tracking-widest">No items found</div>';
            
            data.forEach(p => {
                const soldOut = p.stock <= 0;
                grid.innerHTML += `
                    <div class="bg-white rounded-[16px] overflow-hidden shadow-[0_2px_10px_rgba(0,0,0,0.03)] cursor-pointer relative ${soldOut ? 'opacity-50 grayscale' : ''}" onclick='openModal(${JSON.stringify(p)})'>
                        <div class="aspect-[4/5] w-full bg-gray-50 relative">
                            <img src="${p.thumbnail}" class="w-full h-full object-cover">
                            ${soldOut ? '<div class="absolute inset-0 bg-black/50 flex items-center justify-center"><span class="bg-white text-black px-3 py-1 rounded-full text-[9px] font-black uppercase tracking-widest">Sold Out</span></div>' : ''}
                        </div>
                        <div class="p-3">
                            <h3 class="font-bold text-[11px] text-gray-800 line-clamp-2 leading-snug h-[30px]">${p.title}</h3>
                            <div class="mt-2 flex justify-between items-end">
                                <div class="flex flex-col leading-none">
                                    <span class="text-[8px] font-bold text-gray-400">៛${(p.price * RATE).toLocaleString()}</span>
                                    <span class="font-black text-sm text-black">$${p.price.toFixed(2)}</span>
                                </div>
                                <div class="w-6 h-6 rounded-full bg-gray-100 flex items-center justify-center text-[10px] text-gray-600"><i class="fa-solid fa-plus"></i></div>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        let currentP = null, vIdx = 0, qty = 1;
        
        function openModal(p) {
            if(p.stock <= 0) return;
            currentP = p; vIdx = 0; qty = 1;
            document.getElementById('modal-qty').innerText = qty;
            const modal = document.getElementById('modal');
            modal.style.display = 'flex';
            setTimeout(() => modal.classList.add('active'), 10);
            updateModalUI();
        }

        function closeModal() {
            const modal = document.getElementById('modal');
            modal.classList.remove('active');
            setTimeout(() => modal.style.display = 'none', 350);
        }

        function updateQty(change) {
            qty = Math.max(1, qty + change);
            document.getElementById('modal-qty').innerText = qty;
        }

        function updateModalUI() {
            const v = currentP.variants[vIdx];
            document.getElementById('modal-scroll-area').innerHTML = `
                <div class="w-full aspect-square bg-white relative">
                    <img src="${v.image}" class="w-full h-full object-contain">
                </div>
                
                <div class="bg-white relative -mt-4 rounded-t-[20px] px-5 pt-6 pb-2">
                    <div class="flex items-end gap-2 mb-2">
                        <span class="text-3xl font-black text-black leading-none">$${v.price.toFixed(2)}</span>
                        <span class="text-xs font-bold text-gray-400 mb-1">៛${(v.price * RATE).toLocaleString()}</span>
                    </div>
                    <h2 class="text-sm font-bold text-gray-800 leading-snug">${currentP.title}</h2>
                    <div class="mt-4 flex gap-4 text-[10px] font-bold text-gray-400 uppercase tracking-widest">
                        <span class="bg-gray-50 px-2 py-1 rounded border border-gray-100"><i class="fa-solid fa-box mr-1"></i> Stock: ${v.stock}</span>
                    </div>
                </div>

                <div class="bg-white mt-2 px-5 py-5">
                    <div class="flex justify-between items-center mb-3">
                        <h3 class="text-[11px] font-black text-gray-900 uppercase tracking-widest">Select Variant</h3>
                        <span class="text-[10px] font-bold text-gray-500">${v.name}</span>
                    </div>
                    
                    <div class="flex gap-3 overflow-x-auto pb-2 snap-scroll hide-scrollbar">
                        ${currentP.variants.map((varItem, i) => `
                            <button onclick="vIdx=${i};updateModalUI()" class="snap-item w-20 h-20 rounded-xl flex-shrink-0 overflow-hidden relative border-2 transition-all ${vIdx===i?'border-black':'border-gray-100 opacity-60'}">
                                <img src="${varItem.image}" class="w-full h-full object-cover">
                                ${vIdx===i?'<div class="absolute bottom-0 w-full bg-black text-white text-[8px] font-black py-0.5 text-center"><i class="fa-solid fa-check"></i></div>':''}
                            </button>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function addToBag() {
            const v = currentP.variants[vIdx];
            const id = `${currentP.id}-${vIdx}`;
            const ex = cart.find(i => i.cartId === id);
            if(ex) ex.qty += qty; 
            else cart.push({cartId:id, title:currentP.title, style:v.name, price:v.price, image:v.image, qty});
            
            saveCart(); updateCartUI();
            
            const btn = document.getElementById('add-btn');
            btn.innerText = "ADDED TO BAG ✓";
            btn.classList.add('btn-success');
            setTimeout(() => { btn.innerText = "ADD TO BAG"; btn.classList.remove('btn-success'); }, 800);
            
            qty = 1; document.getElementById('modal-qty').innerText = qty;
        }

        function toggleCart() { document.getElementById('cart').classList.toggle('translate-x-full'); }
        function toggleCheckout() { 
            if(cart.length === 0) return;
            updateCheckoutSummary(); document.getElementById('checkout-modal').classList.toggle('hidden'); 
        }

        function updateCartUI() {
            const list = document.getElementById('cart-items');
            const badge = document.getElementById('cart-badge');
            list.innerHTML = ''; let subUSD = 0; let totalQty = 0;
            
            cart.forEach((i, idx) => {
                subUSD += i.price * i.qty; totalQty += i.qty;
                list.innerHTML += `<div class="flex gap-3 items-center bg-white p-3 rounded-[16px] border border-gray-100 shadow-[0_2px_8px_rgba(0,0,0,0.02)]"><img src="${i.image}" class="w-16 h-16 rounded-xl object-cover bg-gray-50"><div class="flex-1 min-w-0"><h4 class="font-bold text-xs text-gray-800 truncate">${i.title}</h4><p class="text-[10px] font-bold text-gray-400 mt-0.5">${i.style}</p><div class="flex justify-between items-center mt-2"><span class="font-black text-sm text-black">$${i.price.toFixed(2)}</span><span class="text-[10px] font-black bg-gray-100 px-2 py-0.5 rounded">x${i.qty}</span></div></div><button onclick="cart.splice(${idx},1);saveCart();updateCartUI()" class="w-8 h-8 flex items-center justify-center text-gray-300 hover:text-red-500 transition-colors"><i class="fa-solid fa-trash-can text-sm"></i></button></div>`;
            });

            const subKHR = subUSD * RATE; const delivery = calculateDelivery(subKHR);
            document.getElementById('side-sub-khr').innerText = `៛${subKHR.toLocaleString()}`;
            document.getElementById('side-delivery-khr').innerText = delivery === 0 ? "FREE" : `៛${delivery.toLocaleString()}`;
            document.getElementById('total-khr').innerText = `៛${(subKHR + delivery).toLocaleString()}`;
            document.getElementById('total-usd').innerText = `$${((subKHR + delivery) / RATE).toFixed(2)}`;
            
            badge.innerText = totalQty;
            if(totalQty > 0) {
                badge.classList.remove('scale-0'); badge.classList.add('scale-100', 'badge-bounce'); 
                setTimeout(() => badge.classList.remove('badge-bounce'), 400);
            } else { badge.classList.add('scale-0'); }
            if (cart.length === 0) list.innerHTML = `<div class="h-full flex flex-col items-center justify-center text-gray-300 font-bold text-xs uppercase tracking-widest pt-10"><i class="fa-solid fa-basket-shopping text-4xl mb-3 opacity-30"></i>Bag is Empty</div>`;
        }

        function updateCheckoutSummary() {
            const subUSD = cart.reduce((acc, item) => acc + (item.price * item.qty), 0);
            const subKHR = subUSD * RATE; const del = calculateDelivery(subKHR);
            document.getElementById('check-subtotal').innerText = `៛${subKHR.toLocaleString()}`;
            document.getElementById('check-delivery').innerText = del === 0 ? "FREE" : `៛${del.toLocaleString()}`;
            document.getElementById('check-total-khr').innerText = `៛${(subKHR + del).toLocaleString()}`;
        }

        async function processOrder() {
            const btn = document.getElementById('confirm-btn');
            const name = document.getElementById('cust-name').value;
            const phone = document.getElementById('cust-phone').value;
            const address = document.getElementById('cust-address').value;
            if(!name || !phone || !address) return alert("Please fill all details");
            
            btn.innerText = "SENDING..."; btn.disabled = true;
            const subUSD = cart.reduce((acc, item) => acc + (item.price * item.qty), 0);
            const totalUSD = ((subUSD * RATE) + calculateDelivery(subUSD * RATE)) / RATE;

            try {
                const res = await fetch('/api/checkout', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name, phone, address, items: cart, total: totalUSD }) });
                if(res.ok) { alert("Order Successful! We will contact you soon."); cart = []; saveCart(); updateCartUI(); toggleCheckout(); toggleCart(); }
            } catch(e) { alert("Error sending order."); }
            btn.innerText = "SUBMIT ORDER"; btn.disabled = false;
        }

        window.onload = loadStore;
    </script>
</body>
</html>
