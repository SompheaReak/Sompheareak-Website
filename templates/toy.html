
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Somphea Reak - Toy Collection</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@400;500;600;700&family=Moul&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', 'Kantumruy Pro', sans-serif; 
            -webkit-tap-highlight-color: transparent;
            background-color: #f5f7fa;
        }
        h1, h2, h3, h4, .khmer-title { font-family: 'Moul', serif; }
        
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        .cart-checkbox { 
            appearance: none; width: 22px; height: 22px; border: 2px solid #cbd5e1; border-radius: 50%; 
            outline: none; cursor: pointer; position: relative; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); 
            background: white; flex-shrink: 0;
        }
        .cart-checkbox:checked { 
            background-color: #ff5000; border-color: #ff5000; box-shadow: 0 2px 8px rgba(255, 80, 0, 0.3);
        }
        .cart-checkbox:checked::after { 
            content: ''; position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%) rotate(45deg); 
            width: 5px; height: 10px; border: solid white; border-width: 0 2.5px 2.5px 0; border-radius: 1px;
        }

        #cart-drawer, #product-modal, #checkout-modal, #category-modal { transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1); will-change: transform; }
        
        .mask-fade-right {
            -webkit-mask-image: linear-gradient(to right, black 85%, transparent 100%);
            mask-image: linear-gradient(to right, black 85%, transparent 100%);
        }

        /* Taobao-style fluid gradients */
        .btn-taobao {
            background: linear-gradient(90deg, #ff9000 0%, #ff5000 100%);
            color: white;
            box-shadow: 0 4px 10px rgba(255, 80, 0, 0.25);
        }

        /* Fly to cart animation classes */
        .fly-img {
            position: fixed;
            z-index: 9999;
            border-radius: 50%;
            object-fit: cover;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            border: 2px solid #ff5000;
            transition: all 0.7s cubic-bezier(0.25, 1, 0.5, 1);
            pointer-events: none;
        }
    </style>
</head>
<body class="text-gray-900 pb-20">

    <!-- TOAST NOTIFICATION -->
    <div id="toast" style="pointer-events: none;" class="fixed top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 z-[9999] bg-black/80 backdrop-blur-md text-white px-6 py-3 rounded-2xl flex items-center gap-3 shadow-2xl opacity-0 transition-all duration-300 scale-90">
        <i id="toast-icon" class="fa-solid fa-circle-check text-green-400 text-lg"></i>
        <span id="toast-text" class="text-xs font-bold uppercase tracking-widest font-['Kantumruy_Pro']">Added to Cart</span>
    </div>

    <!-- LOADING OVERLAY -->
    <div id="loadingOverlay" style="display: none;" class="fixed inset-0 z-[5000] bg-black/90 backdrop-blur-md flex-col items-center justify-center text-white">
        <div class="w-12 h-12 border-4 border-[#ff5000] border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="text-xs font-black uppercase tracking-[0.3em] font-['Moul']">កំពុងរៀបចំ...</p>
    </div>

    <!-- IMAGE VIEWER MODAL -->
    <div id="image-viewer-modal" class="fixed inset-0 z-[6000] bg-black/95 hidden flex-col items-center justify-center p-4 backdrop-blur-sm transition-opacity">
        <button onclick="closeImageViewer()" class="absolute top-6 right-6 w-12 h-12 flex items-center justify-center bg-white/10 rounded-full text-white hover:bg-red-500 transition-colors"><i class="fa-solid fa-xmark text-xl"></i></button>
        <img id="viewer-img" src="" class="max-w-full max-h-[80vh] object-contain rounded-xl shadow-2xl mb-6">
    </div>

    <!-- 🌟 SLEEK E-COMMERCE HEADER (TAOBAO STYLE) 🌟 -->
    <header class="sticky top-0 z-[100] bg-white/95 backdrop-blur-xl px-3 py-2.5 flex items-center gap-3 shadow-[0_2px_10px_rgba(0,0,0,0.03)] border-b border-gray-100">
        <!-- Back Button -->
        <a href="/" class="w-9 h-9 flex items-center justify-center bg-gray-50 rounded-full text-gray-600 active:scale-90 transition-transform shrink-0 border border-gray-200">
            <i class="fa-solid fa-chevron-left text-sm"></i>
        </a>
        
        <!-- Compact Search Bar -->
        <div class="flex-1 relative flex items-center">
            <i class="fa-solid fa-magnifying-glass absolute left-3.5 text-gray-400 text-[11px]"></i>
            <input type="text" id="searchInput" placeholder="Search toys..." 
                class="w-full bg-gray-100/80 border border-transparent rounded-full py-2 pl-9 pr-8 text-xs font-bold text-gray-800 outline-none focus:bg-white focus:border-[#ff5000] transition-all placeholder-gray-400">
            <button id="clearSearchBtn" onclick="clearSearch()" class="absolute right-2.5 text-gray-400 hover:text-gray-600 hidden active:scale-90 p-1">
                <i class="fa-solid fa-circle-xmark text-[11px]"></i>
            </button>
        </div>
        
        <!-- Global Cart Button -->
        <button onclick="openCartDrawer()" class="relative w-9 h-9 flex items-center justify-center text-gray-700 active:scale-90 transition-transform shrink-0 global-cart-btn">
            <i class="fa-solid fa-cart-shopping text-base"></i>
            <span class="cart-badge-count absolute -top-1 -right-0.5 bg-[#ff5000] text-white text-[8px] font-black w-3.5 h-3.5 rounded-full flex items-center justify-center shadow-sm hidden">0</span>
        </button>
    </header>

    <!-- 🌟 CATEGORY STRIP 🌟 -->
    <section class="sticky top-[53px] z-[90] bg-white border-b border-gray-100 shadow-[0_4px_6px_-4px_rgba(0,0,0,0.05)]">
        <div class="flex items-center px-3 py-2 gap-2 max-w-5xl mx-auto">
            <button onclick="openCategoryModal()" class="shrink-0 w-8 h-8 flex items-center justify-center text-gray-500 active:scale-90 transition-transform border-r border-gray-200 pr-2 mr-1">
                <i class="fa-solid fa-bars-staggered text-sm"></i>
            </button>
            <div id="category-filters" class="flex-1 flex overflow-x-auto gap-2 scrollbar-hide mask-fade-right pr-6 items-center">
                <!-- Dynamically Populated Tabs -->
            </div>
        </div>
    </section>

    <!-- PRODUCT GRID (Square 1:1 Images) -->
    <main class="p-3 max-w-5xl mx-auto min-h-[60vh]">
        <div id="product-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3">
            <!-- Products loaded via JS -->
        </div>
    </main>

    <!-- 🌟 ALL CATEGORIES EXPLORER MODAL 🌟 -->
    <div id="category-modal" class="fixed inset-0 z-[1000] flex flex-col justify-end translate-y-full">
        <div class="absolute inset-0 bg-black/60 transition-opacity" onclick="closeCategoryModal()"></div>
        <div class="relative w-full max-h-[75vh] md:max-w-md md:mx-auto bg-gray-50 rounded-t-[24px] shadow-2xl flex flex-col overflow-hidden">
            <div class="bg-white px-5 py-4 flex items-center justify-between border-b border-gray-100 z-10 sticky top-0">
                <h2 class="text-base font-black text-gray-900 font-['Moul']">ប្រភេទទាំងអស់</h2>
                <button onclick="closeCategoryModal()" class="w-8 h-8 flex items-center justify-center bg-gray-100 rounded-full text-gray-600 active:scale-90 transition-all"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="flex-1 overflow-y-auto p-4">
                <div id="full-category-grid" class="flex flex-col gap-2"></div>
            </div>
        </div>
    </div>

    <!-- PRODUCT DETAIL MODAL -->
    <div id="product-modal" class="fixed inset-0 z-[1000] flex flex-col justify-end translate-y-full">
        <div class="absolute inset-0 bg-black/60 transition-opacity" onclick="closeProductModal()"></div>
        <div class="relative w-full h-[90vh] md:max-w-md md:mx-auto bg-gray-50 rounded-t-[24px] shadow-2xl flex flex-col overflow-hidden">
            
            <!-- Modal Header: Title + [Cart] + [X] -->
            <div class="bg-white/95 backdrop-blur-md px-4 py-3 flex items-center justify-between border-b border-gray-100 z-[40] absolute top-0 left-0 right-0">
                <h2 class="text-sm font-black text-gray-900 truncate pr-2 flex-1" id="modal-title">Product</h2>
                <div class="flex items-center gap-2 shrink-0">
                    <button onclick="openCartDrawer()" id="modal-cart-btn" class="relative w-8 h-8 flex items-center justify-center bg-gray-50 rounded-full text-gray-700 active:scale-90 transition-transform border border-gray-200">
                        <i class="fa-solid fa-cart-shopping text-xs"></i>
                        <span class="cart-badge-count absolute -top-1 -right-1 bg-[#ff5000] text-white text-[8px] font-black w-3.5 h-3.5 rounded-full flex items-center justify-center shadow-sm hidden">0</span>
                    </button>
                    <button onclick="closeProductModal()" class="w-8 h-8 flex items-center justify-center bg-gray-50 rounded-full text-gray-700 active:scale-90 transition-all border border-gray-200"><i class="fa-solid fa-xmark text-sm"></i></button>
                </div>
            </div>

            <div class="flex-1 overflow-y-auto pt-14 pb-6 scrollbar-hide relative bg-gray-50" id="modal-body">
                <!-- Square Main Image Carousel -->
                <div class="bg-white border-b border-gray-100 relative">
                    <div id="modal-image-carousel" class="w-full aspect-square flex overflow-x-auto snap-x snap-mandatory scrollbar-hide relative" onscroll="handleCarouselScroll()"></div>
                    <div class="absolute bottom-3 left-4 bg-white/95 backdrop-blur-sm px-4 py-2 rounded-xl shadow-sm border border-gray-100 flex flex-col pointer-events-none">
                        <span class="text-[9px] font-black text-gray-400 uppercase tracking-widest leading-none mb-0.5">តម្លៃ / Price</span>
                        <span id="modal-price" class="text-xl font-black text-[#ff5000] leading-none">0៛</span>
                    </div>
                </div>

                <div class="px-4 space-y-4 mt-4 relative z-10">
                    <div id="variant-section" class="hidden bg-white p-4 rounded-2xl border border-gray-100 shadow-sm">
                        <p class="text-[10px] font-black text-gray-800 uppercase tracking-widest mb-3 font-['Kantumruy_Pro']">ជ្រើសរើសម៉ូត (Options)</p>
                        <div id="variant-grid" class="grid grid-cols-4 sm:grid-cols-5 gap-2"></div>
                    </div>
                    
                    <div class="pt-2">
                        <div class="flex items-center gap-2 mb-3">
                            <div class="h-px bg-gray-200 flex-1"></div>
                            <h3 class="text-[9px] font-black text-gray-400 uppercase tracking-widest text-center">You Might Also Like</h3>
                            <div class="h-px bg-gray-200 flex-1"></div>
                        </div>
                        <div id="recommendations-grid" class="grid grid-cols-2 gap-3 pb-4"></div>
                    </div>
                </div>
            </div>

            <!-- Bottom Action Bar -->
            <div class="bg-white border-t border-gray-100 p-3 z-[40] flex gap-3 shadow-[0_-5px_15px_rgba(0,0,0,0.03)] pb-safe">
                <div class="flex items-center bg-gray-50 rounded-xl border border-gray-200 p-0.5 h-11 shrink-0">
                    <button onclick="updateModalQty(-1)" class="w-9 h-full flex items-center justify-center text-gray-500 active:scale-95"><i class="fa-solid fa-minus text-xs"></i></button>
                    <span id="modal-qty" class="font-black text-sm w-6 text-center text-gray-800">1</span>
                    <button onclick="updateModalQty(1)" class="w-9 h-full flex items-center justify-center text-gray-500 active:scale-95"><i class="fa-solid fa-plus text-xs"></i></button>
                </div>
                <button onclick="addToCartFromModal(event)" class="flex-1 btn-taobao font-black rounded-xl uppercase text-xs tracking-widest active:scale-95 transition-all flex items-center justify-center gap-1.5 font-['Kantumruy_Pro']">
                    បញ្ចូលទៅកន្ត្រក
                </button>
            </div>
        </div>
    </div>

    <!-- UNIFIED CART DRAWER -->
    <div id="cart-drawer" class="fixed inset-0 z-[7000] flex flex-col justify-end translate-y-full">
        <div class="absolute inset-0 bg-black/60 transition-opacity" onclick="closeCartDrawer()"></div>
        <div class="relative w-full h-[85vh] md:max-w-md md:mx-auto bg-gray-50 rounded-t-[24px] shadow-2xl flex flex-col overflow-hidden">
            <div class="bg-white px-5 py-4 flex items-center justify-between border-b border-gray-100 z-10 shadow-sm">
                <div>
                    <h2 class="text-lg font-black text-gray-900 font-['Moul']">កន្ត្រករបស់អ្នក</h2>
                    <p class="text-[9px] font-bold text-gray-500 uppercase tracking-widest mt-0.5">Shopping Cart</p>
                </div>
                <button onclick="closeCartDrawer()" class="w-8 h-8 flex items-center justify-center bg-gray-100 rounded-full text-gray-600 active:scale-90 transition-all"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div id="cart-items-container" class="flex-1 overflow-y-auto p-4 space-y-3"></div>
            <div class="bg-white border-t border-gray-100 p-4 z-10 pb-safe">
                <div class="space-y-1.5 mb-4">
                    <div class="flex justify-between items-center text-[11px] font-bold text-gray-500">
                        <span>Subtotal:</span>
                        <span id="cart-subtotal">0៛</span>
                    </div>
                    <div class="flex justify-between items-center text-[11px] font-bold text-gray-500">
                        <span>Delivery:</span>
                        <span id="cart-delivery">0៛</span>
                    </div>
                    <div class="flex justify-between items-end pt-2 border-t border-gray-100 mt-2">
                        <span class="text-[10px] font-black text-gray-800 uppercase tracking-widest font-['Kantumruy_Pro']">សរុប (Total)</span>
                        <div class="text-right">
                            <span id="cart-grand-total-khr" class="text-xl font-black text-[#ff5000] leading-none block">0៛</span>
                            <span id="cart-grand-total-usd" class="text-[10px] text-gray-400 font-bold block mt-0.5">$0.00</span>
                        </div>
                    </div>
                </div>
                <button onclick="openCheckout()" class="w-full bg-black text-white font-black py-3.5 rounded-xl shadow-lg uppercase text-xs tracking-widest active:scale-95 transition-all flex items-center justify-center gap-2 font-['Kantumruy_Pro']">
                    បន្តការទិញទំនិញ <i class="fa-solid fa-arrow-right text-[10px]"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- CHECKOUT / DELIVERY MODAL -->
    <div id="checkout-modal" class="fixed inset-0 z-[8000] bg-white flex flex-col translate-y-full transition-transform duration-500 ease-in-out">
        <div class="px-5 py-4 border-b border-gray-100 flex justify-between items-center bg-white sticky top-0 z-10 shadow-sm md:max-w-md md:mx-auto md:w-full">
            <h2 class="text-lg font-black font-['Moul']">ព័ត៌មានដឹកជញ្ជូន</h2>
            <button onclick="closeCheckout()" class="w-8 h-8 bg-gray-100 rounded-full flex items-center justify-center text-gray-600 active:scale-90 transition-all"><i class="fa-solid fa-arrow-left text-sm"></i></button>
        </div>
        <div class="flex-1 overflow-y-auto p-5 pb-32 bg-gray-50 md:max-w-md md:mx-auto md:w-full md:border-x md:border-gray-100">
            <div class="bg-white rounded-2xl p-4 border border-gray-100 space-y-2 mb-5 relative overflow-hidden shadow-sm">
                <div class="absolute top-0 left-0 w-1 h-full bg-[#ff5000]"></div>
                <div class="flex justify-between text-[11px] font-bold text-gray-500"><span>តម្លៃទំនិញសរុប:</span><span id="check-subtotal">៛0</span></div>
                <div class="flex justify-between text-[11px] font-bold text-gray-500"><span>ថ្លៃដឹកជញ្ជូន:</span><span id="check-delivery" class="text-[#ff5000]">៛0</span></div>
                <div class="flex justify-between font-black text-gray-900 border-t border-gray-100 pt-2 mt-2">
                    <span class="text-xs mt-1">សរុបត្រូវបង់:</span>
                    <span id="check-total-khr" class="text-[#ff5000] text-lg leading-none">៛0</span>
                </div>
            </div>
            <div class="space-y-3">
                <div>
                    <label class="block text-[9px] font-black text-gray-500 uppercase tracking-widest ml-1 mb-1">ឈ្មោះ (Name)</label>
                    <input type="text" id="cust-name" class="input-box py-3.5 text-sm" placeholder="បញ្ចូលឈ្មោះរបស់អ្នក">
                </div>
                <div>
                    <label class="block text-[9px] font-black text-gray-500 uppercase tracking-widest ml-1 mb-1">លេខទូរស័ព្ទ (Phone)</label>
                    <input type="tel" id="cust-phone" class="input-box py-3.5 text-sm" placeholder="012 345 678">
                </div>
                <div>
                    <label class="block text-[9px] font-black text-gray-500 uppercase tracking-widest ml-1 mb-1">អាសយដ្ឋាន (Address)</label>
                    <textarea id="cust-address" rows="3" class="input-box text-sm resize-none" placeholder="ទីតាំងដឹកជញ្ជូនលម្អិត..."></textarea>
                </div>
            </div>
        </div>
        <div class="absolute bottom-0 left-0 w-full bg-white border-t border-gray-100 p-4 pb-safe md:max-w-md md:left-1/2 md:-translate-x-1/2 md:border-x">
            <button onclick="processFinalOrder()" id="confirm-btn" class="w-full btn-taobao py-3.5 rounded-xl uppercase text-xs tracking-widest active:scale-95 transition-all font-['Kantumruy_Pro'] flex items-center justify-center">
                បញ្ជាក់ការកម្ម៉ង់
            </button>
        </div>
    </div>

    <script>
        const RATE = 4000;
        let allProducts = [];
        let userCart = [];
        let currentModalProduct = null;
        let currentVariantIndex = 0;
        let modalQty = 1;
        let isProgrammaticScroll = false;
        let scrollTimeout;
        
        let activeCategory = 'All';
        let currentSearchQuery = '';

        try {
            const savedCart = localStorage.getItem('sr_cart');
            if (savedCart) userCart = JSON.parse(savedCart);
        } catch(e) {}

        function calculateDelivery(subtotalKHR) {
            if (subtotalKHR === 0) return 0;
            if (subtotalKHR < 20000) return 8000;
            if (subtotalKHR < 40000) return 6000;
            if (subtotalKHR < 60000) return 4000;
            if (subtotalKHR < 80000) return 2000;
            return 0; 
        }

        function updateCartBadge() {
            document.querySelectorAll('.cart-badge-count').forEach(badge => {
                if(userCart.length > 0) {
                    badge.innerText = userCart.length; badge.classList.remove('hidden');
                } else {
                    badge.classList.add('hidden');
                }
            });
        }

        async function fetchProducts() {
            document.getElementById('loadingOverlay').style.display = 'flex';
            try {
                const res = await fetch('/api/products/toy');
                if(!res.ok) throw new Error("API not accessible.");
                const data = await res.json();
                allProducts = data.products.filter(p => p.is_visible !== false && p.is_visible !== 0);
            } catch (e) {
                console.warn("Using mock data.");
                allProducts = [
                    { id: 101, title: "Lego Technic Race Car", price: 25, category: "Building Blocks", image: "https://images.unsplash.com/photo-1585366119957-e9730b6d0f60?w=900&auto=format&fit=crop&q=80", stock: 12, parsed_variants: [] },
                    { id: 102, title: "Soft Teddy Bear Premium", price: 15, category: "Plushies", image: "https://images.unsplash.com/photo-1559454403-b8fb88521f11?w=900&auto=format&fit=crop&q=80", stock: 20, parsed_variants: [] },
                    { id: 103, title: "Classic Rubik's Cube 3x3", price: 5, category: "Puzzles", image: "https://images.unsplash.com/photo-1591991731833-b4807cf7ef94?w=900&auto=format&fit=crop&q=80", stock: 50, parsed_variants: [] },
                    { id: 104, title: "RC Fast Drift Car", price: 40, category: "Vehicles", image: "https://images.unsplash.com/photo-1594787318286-3d835c1d207f?w=900&auto=format&fit=crop&q=80", stock: 8, parsed_variants: [] }
                ];
            } finally {
                document.getElementById('loadingOverlay').style.display = 'none';
            }
            renderCategoryFilters();
            renderProducts();
            updateCartBadge();
        }

        // --- SMART SEARCH & CATEGORY LOGIC ---
        document.getElementById('searchInput').addEventListener('input', (e) => {
            currentSearchQuery = e.target.value;
            const clearBtn = document.getElementById('clearSearchBtn');
            if (currentSearchQuery.length > 0) clearBtn.classList.remove('hidden');
            else clearBtn.classList.add('hidden');
            renderProducts();
        });

        function clearSearch() {
            document.getElementById('searchInput').value = '';
            currentSearchQuery = '';
            document.getElementById('clearSearchBtn').classList.add('hidden');
            renderProducts();
        }

        function setCategory(cat) {
            activeCategory = cat;
            document.querySelectorAll('.strip-btn').forEach(b => {
                if(b.dataset.cat === cat) {
                    b.classList.add('bg-gray-900', 'text-white', 'border-gray-900');
                    b.classList.remove('bg-white', 'text-gray-600', 'border-gray-200', 'hover:bg-gray-50');
                } else {
                    b.classList.remove('bg-gray-900', 'text-white', 'border-gray-900');
                    b.classList.add('bg-white', 'text-gray-600', 'border-gray-200', 'hover:bg-gray-50');
                }
            });
            
            const activeBtn = document.querySelector(`.strip-btn[data-cat="${cat}"]`);
            if (activeBtn) activeBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });

            closeCategoryModal();
            renderProducts();
        }

        function openCategoryModal() { document.getElementById('category-modal').classList.remove('translate-y-full'); }
        function closeCategoryModal() { document.getElementById('category-modal').classList.add('translate-y-full'); }

        function renderCategoryFilters() {
            let cats = new Set(['All']);
            allProducts.forEach(p => {
                if(p.category) p.category.split(',').forEach(c => { if(c.trim()) cats.add(c.trim()); });
                let variants = p.parsed_variants || [];
                if(variants.length === 0 && p.variants) { try { variants = typeof p.variants === 'string' ? JSON.parse(p.variants) : p.variants; } catch(e){} }
                variants.forEach(v => { if(v.category) v.category.split(',').forEach(c => { if(c.trim()) cats.add(c.trim()); }); });
            });

            const catArray = Array.from(cats).sort((a, b) => a === 'All' ? -1 : b === 'All' ? 1 : a.localeCompare(b));

            document.getElementById('category-filters').innerHTML = catArray.map(c => 
                `<button data-cat="${c}" onclick="setCategory('${c}')" class="strip-btn px-4 py-1.5 rounded-full border ${c === activeCategory ? 'bg-gray-900 text-white border-gray-900' : 'bg-white text-gray-600 border-gray-200 hover:bg-gray-50'} text-[10px] font-bold uppercase tracking-wider whitespace-nowrap transition-colors shadow-sm flex-shrink-0">${c}</button>`
            ).join('');

            document.getElementById('full-category-grid').innerHTML = catArray.map(c => 
                `<button onclick="setCategory('${c}')" class="w-full px-5 py-3.5 rounded-xl border ${c === activeCategory ? 'bg-orange-50 border-[#ff5000] text-[#ff5000]' : 'bg-white text-gray-700 border-gray-200 hover:border-gray-300'} text-sm font-bold tracking-wide text-left flex items-center justify-between transition-all group shadow-sm">
                    <span class="font-['Plus_Jakarta_Sans']">${c}</span>
                    <div class="w-5 h-5 rounded-full flex items-center justify-center ${c === activeCategory ? 'bg-[#ff5000] text-white' : 'bg-gray-100 text-gray-400 group-hover:bg-gray-200'} transition-colors">
                        <i class="fa-solid ${c === activeCategory ? 'fa-check' : 'fa-chevron-right'} text-[9px]"></i>
                    </div>
                </button>`
            ).join('');
        }

        function renderProducts() {
            let filtered = allProducts;

            if (activeCategory !== 'All') {
                const targetCatLower = activeCategory.toLowerCase();
                filtered = filtered.filter(p => {
                    if (p.category && p.category.split(',').map(c=>c.trim().toLowerCase()).includes(targetCatLower)) return true;
                    let variants = p.parsed_variants || [];
                    if(variants.length === 0 && p.variants) { try { variants = typeof p.variants === 'string' ? JSON.parse(p.variants) : p.variants; } catch(e){} }
                    return variants.some(v => v.category && v.category.split(',').map(c=>c.trim().toLowerCase()).includes(targetCatLower));
                });
            }

            if (currentSearchQuery.trim() !== '') {
                const q = currentSearchQuery.toLowerCase().trim();
                filtered = filtered.filter(p => (p.title && p.title.toLowerCase().includes(q)) || (p.category && p.category.toLowerCase().includes(q)) );
            }

            const grid = document.getElementById('product-grid');

            if (filtered.length === 0) {
                grid.innerHTML = `
                    <div class="col-span-2 md:col-span-3 lg:col-span-4 flex flex-col items-center justify-center py-20 opacity-80">
                        <div class="w-16 h-16 bg-gray-100 rounded-full flex items-center justify-center mb-3"><i class="fa-solid fa-magnifying-glass-minus text-2xl text-gray-400"></i></div>
                        <h3 class="text-sm font-black text-gray-800 uppercase tracking-widest font-['Moul']">រកមិនឃើញទំនិញទេ</h3>
                        <p class="text-[10px] text-gray-500 mt-1 font-bold uppercase tracking-wider">Try a different search</p>
                    </div>`;
                return;
            }

            if (activeCategory === 'All' && currentSearchQuery === '') {
                filtered = [...filtered].sort(() => 0.5 - Math.random());
            }
            
            grid.innerHTML = filtered.map((p, index) => {
                let variants = p.parsed_variants || [];
                if(variants.length === 0 && p.variants) { try { variants = typeof p.variants === 'string' ? JSON.parse(p.variants) : p.variants; } catch(e){} }
                const price = variants.length > 0 ? (variants[0].price * RATE) : (p.price * RATE);
                const image = p.image || p.thumbnail;
                const isHot = index % 5 === 0;

                return `
                <div onclick="openProductModal(${p.id})" class="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden flex flex-col cursor-pointer active:scale-95 transition-all hover:shadow-md group">
                    <div class="aspect-square w-full bg-gray-50 relative overflow-hidden flex items-center justify-center p-2 border-b border-gray-100">
                        ${isHot ? `<div class="absolute top-2 left-2 z-10 bg-[#ff5000] text-white text-[8px] font-black px-1.5 py-0.5 rounded uppercase tracking-widest shadow-sm">HOT</div>` : ''}
                        <img src="${image}" class="w-full h-full object-contain mix-blend-multiply group-hover:scale-105 transition-transform duration-500">
                    </div>
                    <div class="p-2.5 flex flex-col flex-grow bg-white">
                        <h3 class="font-black text-[11px] text-gray-800 line-clamp-2 leading-tight group-hover:text-[#ff5000] transition-colors">${p.title}</h3>
                        <div class="mt-auto pt-2 flex justify-between items-center">
                            <span class="font-black text-sm text-[#ff5000] leading-none">${price.toLocaleString()}៛</span>
                            <div class="w-6 h-6 rounded-full bg-gray-100 flex items-center justify-center text-gray-600 group-hover:bg-[#ff5000] group-hover:text-white transition-colors"><i class="fa-solid fa-plus text-[9px]"></i></div>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        // --- PRODUCT MODAL LOGIC ---
        function openProductModal(id) {
            currentModalProduct = allProducts.find(p => p.id === id);
            if(!currentModalProduct) return;
            
            document.getElementById('modal-title').innerText = currentModalProduct.title;
            currentVariantIndex = 0; modalQty = 1;
            document.getElementById('modal-qty').innerText = modalQty;
            document.getElementById('modal-body').scrollTop = 0;
            
            let variants = currentModalProduct.parsed_variants || [];
            if(variants.length === 0 && currentModalProduct.variants) {
                 try { variants = typeof currentModalProduct.variants === 'string' ? JSON.parse(currentModalProduct.variants) : currentModalProduct.variants; } catch(e){}
            }
            
            const carousel = document.getElementById('modal-image-carousel');
            const varSection = document.getElementById('variant-section');
            const varGrid = document.getElementById('variant-grid');
            
            if(variants.length > 0) {
                carousel.innerHTML = variants.map(v => `
                    <div class="min-w-full aspect-square snap-center relative cursor-pointer flex items-center justify-center bg-gray-50" onclick="openImageViewer('${v.image || currentModalProduct.image || currentModalProduct.thumbnail}')">
                        <img src="${v.image || currentModalProduct.image || currentModalProduct.thumbnail}" class="w-full h-full object-contain p-4 mix-blend-multiply">
                    </div>
                `).join('');

                varSection.classList.remove('hidden');
                // Use aspect-square for variant options
                varGrid.innerHTML = variants.map((v, i) => `
                    <div onclick="selectVariant(${i})" class="variant-btn w-full aspect-square bg-white rounded-xl border-2 ${i === 0 ? 'border-[#ff5000]' : 'border-gray-100 hover:border-gray-300'} overflow-hidden cursor-pointer p-1 transition-colors relative flex items-center justify-center">
                        ${i === 0 ? '<div class="absolute top-1 right-1 w-2 h-2 bg-[#ff5000] rounded-full border border-white z-10"></div>' : ''}
                        <img src="${v.image || currentModalProduct.image || currentModalProduct.thumbnail}" class="w-full h-full object-contain mix-blend-multiply">
                    </div>
                `).join('');
                
                updatePriceAndStock(variants[0].price, variants[0].stock);
            } else {
                varSection.classList.add('hidden');
                carousel.innerHTML = `
                    <div class="min-w-full aspect-square snap-center relative cursor-pointer flex items-center justify-center bg-gray-50" onclick="openImageViewer('${currentModalProduct.image || currentModalProduct.thumbnail}')">
                        <img src="${currentModalProduct.image || currentModalProduct.thumbnail}" class="w-full h-full object-contain p-4 mix-blend-multiply">
                    </div>
                `;
                updatePriceAndStock(currentModalProduct.price, currentModalProduct.stock);
            }
            
            isProgrammaticScroll = true;
            carousel.scrollLeft = 0;
            setTimeout(() => isProgrammaticScroll = false, 50);

            renderRecommendations(id);
            document.getElementById('product-modal').classList.remove('translate-y-full');
        }

        function handleCarouselScroll() {
            if(isProgrammaticScroll) return;
            clearTimeout(scrollTimeout);
            scrollTimeout = setTimeout(() => {
                const carousel = document.getElementById('modal-image-carousel');
                const index = Math.round(carousel.scrollLeft / carousel.clientWidth);
                if (index !== currentVariantIndex && index >= 0) {
                    updateVariantUIOnly(index);
                }
            }, 50);
        }

        function selectVariant(idx) {
            updateVariantUIOnly(idx);
            isProgrammaticScroll = true;
            const carousel = document.getElementById('modal-image-carousel');
            carousel.scrollTo({ left: carousel.clientWidth * idx, behavior: 'smooth' });
            setTimeout(() => { isProgrammaticScroll = false; }, 400);
        }

        function updateVariantUIOnly(idx) {
            currentVariantIndex = idx;
            document.querySelectorAll('.variant-btn').forEach((btn, i) => {
                if(i === idx) {
                    btn.classList.add('border-[#ff5000]'); btn.classList.remove('border-gray-100', 'hover:border-gray-300');
                    if(!btn.querySelector('.bg-\\[\\#ff5000\\]')) btn.innerHTML += '<div class="absolute top-1 right-1 w-2 h-2 bg-[#ff5000] rounded-full border border-white z-10"></div>';
                } else {
                    btn.classList.remove('border-[#ff5000]'); btn.classList.add('border-gray-100', 'hover:border-gray-300');
                    const dot = btn.querySelector('.bg-\\[\\#ff5000\\]'); if(dot) dot.remove();
                }
            });
            
            let variants = currentModalProduct.parsed_variants || [];
            if(variants.length === 0 && currentModalProduct.variants) { try { variants = typeof currentModalProduct.variants === 'string' ? JSON.parse(currentModalProduct.variants) : currentModalProduct.variants; } catch(e){} }
            if (variants.length > 0 && variants[idx]) updatePriceAndStock(variants[idx].price, variants[idx].stock);
        }

        function updatePriceAndStock(price, stock) {
            document.getElementById('modal-price').innerText = (parseFloat(price) * RATE).toLocaleString() + '៛';
            const stockEl = document.getElementById('modal-stock');
            if(parseInt(stock) > 0) {
                stockEl.innerText = "In Stock"; stockEl.className = "text-xs font-black text-green-600 bg-green-50 px-3 py-1.5 rounded-lg border border-green-100 inline-block";
            } else {
                stockEl.innerText = "Sold Out"; stockEl.className = "text-xs font-black text-red-600 bg-red-50 px-3 py-1.5 rounded-lg border border-red-100 inline-block";
            }
        }

        function renderRecommendations(excludeId) {
            const available = allProducts.filter(p => p.id !== excludeId);
            const shuffled = available.sort(() => 0.5 - Math.random());
            const grid = document.getElementById('recommendations-grid');
            grid.innerHTML = shuffled.slice(0, 4).map(p => {
                const price = p.parsed_variants && p.parsed_variants.length > 0 ? (p.parsed_variants[0].price * RATE) : (p.price * RATE);
                const image = p.image || p.thumbnail;
                return `
                <div onclick="swapToRecommendation(${p.id})" class="bg-white rounded-xl border border-gray-100 shadow-sm overflow-hidden flex flex-col cursor-pointer active:scale-95 transition-all hover:border-[#ff5000]">
                    <div class="aspect-square bg-gray-50 relative p-2 flex items-center justify-center border-b border-gray-100">
                        <img src="${image}" class="max-w-full max-h-full object-contain mix-blend-multiply">
                    </div>
                    <div class="p-2 flex flex-col flex-grow bg-white">
                        <h3 class="font-bold text-[9px] text-gray-700 line-clamp-1 mb-0.5 leading-tight">${p.title}</h3>
                        <span class="font-black text-[10px] text-[#ff5000] mt-auto">${price.toLocaleString()}៛</span>
                    </div>
                </div>`;
            }).join('');
        }

        function swapToRecommendation(newId) {
            document.getElementById('modal-body').scrollTo({ top: 0, behavior: 'smooth' });
            setTimeout(() => { openProductModal(newId); }, 100);
        }

        function updateModalQty(delta) {
            modalQty += delta;
            if(modalQty < 1) modalQty = 1;
            if(modalQty > 10) modalQty = 10;
            document.getElementById('modal-qty').innerText = modalQty;
        }

        function closeProductModal() { document.getElementById('product-modal').classList.add('translate-y-full'); }

        // --- FLY TO CART ANIMATION ---
        function flyToCartAnimation(imgSrc) {
            const cartIcon = document.querySelector('#modal-cart-btn') || document.querySelector('.global-cart-btn');
            if (!cartIcon || !imgSrc) return;

            const cartRect = cartIcon.getBoundingClientRect();
            // Start from bottom middle of screen
            const startX = window.innerWidth / 2;
            const startY = window.innerHeight - 100;

            const flyingImg = document.createElement('img');
            flyingImg.src = imgSrc;
            flyingImg.className = 'fly-img bg-white';
            flyingImg.style.left = (startX - 30) + 'px';
            flyingImg.style.top = (startY - 30) + 'px';
            flyingImg.style.width = '60px';
            flyingImg.style.height = '60px';
            
            document.body.appendChild(flyingImg);

            // Animate next frame
            requestAnimationFrame(() => {
                flyingImg.style.left = (cartRect.left + 5) + 'px';
                flyingImg.style.top = (cartRect.top + 5) + 'px';
                flyingImg.style.width = '15px';
                flyingImg.style.height = '15px';
                flyingImg.style.opacity = '0.3';
                flyingImg.style.transform = 'scale(0.5) rotate(180deg)';
            });

            setTimeout(() => {
                flyingImg.remove();
                cartIcon.classList.add('scale-125');
                setTimeout(() => cartIcon.classList.remove('scale-125'), 200);
            }, 700); // match transition duration
        }

        function addToCartFromModal(event) {
            if(!currentModalProduct) return;
            
            let variants = currentModalProduct.parsed_variants || [];
            if(variants.length === 0 && currentModalProduct.variants) {
                 try { variants = typeof currentModalProduct.variants === 'string' ? JSON.parse(currentModalProduct.variants) : currentModalProduct.variants; } catch(e){}
            }

            let dbId, price, image, stock, styleName;

            if(variants.length > 0) {
                const v = variants[currentVariantIndex];
                dbId = `${currentModalProduct.id}-${currentVariantIndex}`;
                price = parseFloat(v.price) * RATE;
                image = v.image || currentModalProduct.image || currentModalProduct.thumbnail;
                stock = parseInt(v.stock);
                styleName = v.name || `Style ${currentVariantIndex + 1}`;
            } else {
                dbId = `${currentModalProduct.id}-0`;
                price = parseFloat(currentModalProduct.price) * RATE;
                image = currentModalProduct.image || currentModalProduct.thumbnail;
                stock = parseInt(currentModalProduct.stock);
                styleName = "Standard";
            }

            if(stock <= 0) return alert("Sorry, this item is sold out!");

            const existing = userCart.find(i => i.id === dbId);
            if(existing) { existing.qty += modalQty; } 
            else {
                userCart.push({
                    id: dbId, type: 'standard', title: currentModalProduct.title,
                    style: styleName, price: price, image: image, maxStock: stock,
                    qty: modalQty, selected: true
                });
            }
            
            saveCart(); 
            updateCartBadge(); 
            
            // Trigger Animation & Toast (Notice we DO NOT call closeProductModal() here!)
            flyToCartAnimation(image);
            
            const btn = event.currentTarget;
            const origHtml = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-check"></i> Added';
            btn.classList.replace('bg-[#ff5000]', 'bg-green-500');
            setTimeout(() => {
                btn.innerHTML = origHtml;
                btn.classList.replace('bg-green-500', 'bg-[#ff5000]');
            }, 1000);
        }

        // --- CART AND CHECKOUT LOGIC ---
        function openCartDrawer() { renderCartUI(); document.getElementById('cart-drawer').classList.remove('translate-y-full'); }
        function closeCartDrawer() { document.getElementById('cart-drawer').classList.add('translate-y-full'); }

        function renderCartUI() {
            const container = document.getElementById('cart-items-container');
            
            if(userCart.length === 0) {
                container.innerHTML = `<div class="py-20 text-center opacity-30"><i class="fa-solid fa-cart-arrow-down text-5xl mb-3 block"></i><p class="font-black text-sm uppercase tracking-widest mt-2">កន្ត្រកទទេ</p></div>`;
                document.getElementById('cart-subtotal').innerText = "0៛";
                document.getElementById('cart-delivery').innerText = "0៛";
                document.getElementById('cart-grand-total-khr').innerText = "0៛";
                document.getElementById('cart-grand-total-usd').innerText = "$0.00";
                return;
            }

            let subtotal = 0; let customIndex = 1;

            container.innerHTML = userCart.map((item) => {
                let itemTotal = 0;
                if(item.type === 'custom_bracelet') {
                    itemTotal = (item.baseTotal + item.pkgPrice) * item.qty;
                    if(item.selected) subtotal += itemTotal;
                    
                    return `
                    <div class="bg-white rounded-2xl shadow-sm border ${item.selected ? 'border-[#ff5000] ring-1 ring-orange-100' : 'border-gray-200'} flex flex-col relative transition-all overflow-hidden mb-3">
                        <div class="w-full aspect-[2/1] bg-gray-50 border-b border-gray-100 relative cursor-pointer group flex items-center justify-center p-2" onclick="openImageViewer('${item.image}')">
                            <img src="${item.image}" class="max-w-full max-h-full object-contain mix-blend-multiply">
                            <div class="absolute bottom-0 left-0 right-0 bg-white/90 backdrop-blur-sm px-3 py-1.5 flex justify-between items-center border-t border-gray-100">
                                <span class="text-[9px] font-bold tracking-widest uppercase font-['Kantumruy_Pro']"><i class="fa-solid fa-gem text-orange-400 mr-1"></i> ${item.charms.length} Charms</span>
                                <span class="text-xs font-black text-[#ff5000]">${itemTotal.toLocaleString()}៛</span>
                            </div>
                        </div>
                        <div class="p-3">
                            <div class="flex justify-between items-start mb-2">
                                <label class="flex items-start gap-3 cursor-pointer flex-1">
                                    <input type="checkbox" class="cart-checkbox mt-0.5" ${item.selected ? 'checked' : ''} onchange="toggleCartItem('${item.id}')">
                                    <div>
                                        <h4 class="font-black text-[11px] text-gray-900 leading-tight">Custom Bracelet #${customIndex++}</h4>
                                        <p class="text-[9px] font-bold text-gray-500 mt-0.5 uppercase tracking-widest flex items-center">
                                            Code: <span class="font-mono text-gray-800 ml-1">${item.code.substring(0,8)}</span>
                                        </p>
                                    </div>
                                </label>
                                <button type="button" onclick="removeCartItem('${item.id}')" class="text-gray-300 hover:text-red-500 px-2 active:scale-90 transition-transform"><i class="fa-solid fa-trash-can text-sm"></i></button>
                            </div>
                            <div class="flex justify-between items-center mt-3 pt-2 border-t border-gray-100">
                                <div class="bg-gray-50 text-gray-600 text-[9px] font-bold uppercase tracking-widest px-2 py-1 rounded border border-gray-200 flex items-center gap-1 shadow-sm">
                                    <i class="fa-solid ${item.pkgName === 'Premium Box' ? 'fa-gift text-orange-500' : 'fa-box-open'}"></i> ${item.pkgName || 'Normal'}
                                </div>
                                <div class="flex items-center gap-2 bg-gray-50 rounded-lg p-0.5 border border-gray-200">
                                    <button onclick="updateCartQty('${item.id}', -1)" class="w-6 h-6 flex items-center justify-center bg-white rounded shadow-sm text-gray-600 active:scale-90"><i class="fa-solid fa-minus text-[9px]"></i></button>
                                    <span class="font-black text-xs w-4 text-center">${item.qty}</span>
                                    <button onclick="updateCartQty('${item.id}', 1)" class="w-6 h-6 flex items-center justify-center bg-white rounded shadow-sm text-gray-600 active:scale-90"><i class="fa-solid fa-plus text-[9px]"></i></button>
                                </div>
                            </div>
                        </div>
                    </div>`;
                } else {
                    itemTotal = (item.price || 0) * item.qty;
                    if(item.selected) subtotal += itemTotal;

                    return `
                    <div class="bg-white p-3 rounded-2xl shadow-sm border ${item.selected ? 'border-[#ff5000] ring-1 ring-orange-100' : 'border-gray-200'} flex gap-3 relative transition-all mb-3">
                        <label class="flex items-center cursor-pointer">
                            <input type="checkbox" class="cart-checkbox" ${item.selected ? 'checked' : ''} onchange="toggleCartItem('${item.id}')">
                        </label>
                        <div class="w-16 h-16 bg-gray-50 rounded-xl border border-gray-100 flex-shrink-0 flex items-center justify-center p-1 cursor-pointer aspect-square" onclick="openImageViewer('${item.image}')">
                            <img src="${item.image}" class="max-w-full max-h-full object-contain mix-blend-multiply">
                        </div>
                        <div class="flex-1 flex flex-col justify-between py-0.5 min-w-0">
                            <div>
                                <div class="flex justify-between items-start">
                                    <h4 class="font-black text-[11px] text-gray-900 leading-tight truncate pr-2">${item.title}</h4>
                                    <button onclick="removeCartItem('${item.id}')" class="text-gray-300 hover:text-red-500 active:scale-90 transition-transform"><i class="fa-solid fa-trash-can text-sm"></i></button>
                                </div>
                                <p class="text-[9px] font-bold text-gray-400 mt-0.5 uppercase tracking-widest truncate">${item.style}</p>
                            </div>
                            <div class="flex justify-between items-end mt-1">
                                <span class="font-black text-xs text-[#ff5000]">${itemTotal.toLocaleString()}៛</span>
                                <div class="flex items-center gap-2 bg-gray-50 rounded-lg p-0.5 border border-gray-200">
                                    <button onclick="updateCartQty('${item.id}', -1)" class="w-6 h-6 flex items-center justify-center bg-white rounded shadow-sm text-gray-600 active:scale-90"><i class="fa-solid fa-minus text-[9px]"></i></button>
                                    <span class="font-black text-xs w-4 text-center">${item.qty}</span>
                                    <button onclick="updateCartQty('${item.id}', 1)" class="w-6 h-6 flex items-center justify-center bg-white rounded shadow-sm text-gray-600 active:scale-90"><i class="fa-solid fa-plus text-[9px]"></i></button>
                                </div>
                            </div>
                        </div>
                    </div>`;
                }
            }).join('');
            
            const delivery = calculateDelivery(subtotal);
            const grandTotalKHR = subtotal + delivery;
            const grandTotalUSD = grandTotalKHR / RATE;

            document.getElementById('cart-subtotal').innerText = subtotal.toLocaleString() + "៛";
            
            const deliveryEl = document.getElementById('cart-delivery');
            if (delivery === 0 && subtotal > 0) {
                deliveryEl.innerText = "FREE";
                deliveryEl.className = "text-green-500 font-black text-[11px]";
            } else if (subtotal > 0) {
                deliveryEl.innerText = "+" + delivery.toLocaleString() + "៛";
                deliveryEl.className = "text-[#ff5000] font-black text-[11px]";
            } else {
                deliveryEl.innerText = "0៛";
                deliveryEl.className = "text-gray-500 font-bold text-[11px]";
            }

            document.getElementById('cart-grand-total-khr').innerText = grandTotalKHR.toLocaleString() + "៛";
            document.getElementById('cart-grand-total-usd').innerText = "$" + grandTotalUSD.toFixed(2);
        }

        function toggleCartItem(id) { const item = userCart.find(i => i.id === id); if(item) { item.selected = !item.selected; saveCart(); renderCartUI(); } }
        function updateCartQty(id, delta) { const item = userCart.find(i => i.id === id); if(item) { item.qty += delta; if(item.qty < 1) item.qty = 1; if(item.qty > 10) item.qty = 10; saveCart(); renderCartUI(); } }
        function removeCartItem(id) { if(confirm("លុបចេញពីកន្ត្រក?")) { userCart = userCart.filter(i => i.id !== id); saveCart(); renderCartUI(); updateCartBadge(); } }
        function saveCart() { localStorage.setItem('sr_cart', JSON.stringify(userCart)); }

        function openCheckout() {
            const selectedItems = userCart.filter(i => i.selected);
            if(selectedItems.length === 0) return alert("សូមជ្រើសរើសយ៉ាងហោចណាស់មួយដើម្បីបន្ត!");

            let subtotal = 0;
            selectedItems.forEach(item => {
                if(item.type === 'custom_bracelet') subtotal += ((item.baseTotal + item.pkgPrice) * item.qty);
                else subtotal += (item.price * item.qty);
            });
            
            const delivery = calculateDelivery(subtotal);
            document.getElementById('check-subtotal').innerText = subtotal.toLocaleString() + "៛";
            document.getElementById('check-delivery').innerText = delivery === 0 ? "ឥតគិតថ្លៃ" : delivery.toLocaleString() + "៛";
            document.getElementById('check-total-khr').innerText = (subtotal + delivery).toLocaleString() + "៛";

            closeCartDrawer();
            document.getElementById('checkout-modal').classList.remove('translate-y-full');
        }

        function closeCheckout() { document.getElementById('checkout-modal').classList.add('translate-y-full'); }

        async function processFinalOrder() {
            const selectedItems = userCart.filter(i => i.selected);
            if(selectedItems.length === 0) return;

            const name = document.getElementById('cust-name').value.trim(); const phone = document.getElementById('cust-phone').value.trim(); const address = document.getElementById('cust-address').value.trim();
            if(!name || !phone || !address) return alert("សូមបំពេញព័ត៌មានអោយបានគ្រប់គ្រាន់!"); if(phone.length < 8) return alert("លេខទូរស័ព្ទមិនត្រឹមត្រូវ!");

            const btn = document.getElementById('confirm-btn'); btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> កំពុងបញ្ជូន...'; btn.disabled = true;

            let subtotal = 0; const orderItemsPayload = []; const charmCounts = {}; 

            selectedItems.forEach((cartItem, bIdx) => {
                if(cartItem.type === 'custom_bracelet') {
                    const itemPrice = cartItem.baseTotal + cartItem.pkgPrice; subtotal += (itemPrice * cartItem.qty);
                    const styleText = `Bracelet #${bIdx+1} | Code: ${cartItem.code} | Charms: ${cartItem.charms.length} | Pkg: ${cartItem.pkgName}`;
                    orderItemsPayload.push({ cartId: "custom-" + Date.now() + "-" + bIdx, title: "Custom DIY Bracelet", style: styleText, price: itemPrice / RATE, qty: cartItem.qty, image: cartItem.image, maxStock: 99 });
                    cartItem.charms.forEach(c => { charmCounts[c.db_id] = (charmCounts[c.db_id] || 0) + (1 * cartItem.qty); });
                } else {
                    subtotal += (cartItem.price * cartItem.qty);
                    orderItemsPayload.push({ cartId: cartItem.id, title: cartItem.title, style: cartItem.style, price: cartItem.price / RATE, qty: cartItem.qty, image: cartItem.image, maxStock: cartItem.maxStock });
                }
            });

            for (const [id, count] of Object.entries(charmCounts)) { orderItemsPayload.push({ cartId: id, title: "DIY-Part", style: "Hidden stock component", price: 0, qty: count, image: "hidden", maxStock: 99 }); }

            const delivery = calculateDelivery(subtotal); const totalUSD = (subtotal + delivery) / RATE;

            try {
                const res = await fetch('/api/checkout', { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify({ name, phone, address, items: orderItemsPayload, total: totalUSD }) 
                });
                
                if(res.ok) { 
                    alert("Order Successful! We will contact you on Telegram soon."); 
                    userCart = userCart.filter(i => !i.selected); 
                    saveCart(); 
                    window.location.reload(); 
                }
            } catch (e) { alert("Error sending order"); }
            btn.innerHTML = "បញ្ជាក់ការកម្ម៉ង់ (Confirm Order)"; btn.disabled = false;
        }

        fetchProducts();
    </script>
</body>
