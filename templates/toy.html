<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Somphea Reak | Toy Universe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Kantumruy+Pro:wght@400;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f9fafb; }
        .khmer { font-family: 'Kantumruy Pro', sans-serif; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .cat-pill.active { background: #000; color: #fff; transform: scale(1.05); }
        .variant-pill.active { border-color: #ff5000; background-color: #fff7ed; }
        
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .animate-slide-up { animation: slideUp 0.3s ease-out; }
    </style>
</head>
<body class="overflow-x-hidden">

    <!-- NAVIGATION -->
    <nav class="fixed top-0 w-full bg-white/90 backdrop-blur-xl z-50 border-b h-16 flex items-center px-4 justify-between">
        <div class="flex items-center gap-4">
            <a href="/" class="w-10 h-10 flex items-center justify-center rounded-full bg-gray-50 hover:bg-black hover:text-white transition-all">
                <i class="fa-solid fa-house text-sm"></i>
            </a>
            <div class="flex flex-col leading-none">
                <span class="khmer font-bold text-gray-900 text-sm">សម្ភារៈ</span>
                <span class="text-[9px] font-black text-gray-400 tracking-tighter uppercase">Somphea Reak</span>
            </div>
        </div>
        <button onclick="toggleCart()" class="relative w-10 h-10 flex items-center justify-center rounded-full bg-gray-50 shadow-sm">
            <i class="fa-solid fa-cart-shopping text-gray-700"></i>
            <span id="cart-badge" class="absolute -top-1 -right-1 bg-[#ff5000] text-white text-[9px] font-black w-4 h-4 rounded-full flex items-center justify-center">0</span>
        </button>
    </nav>

    <!-- TAOBAO FILTER BAR -->
    <div class="mt-16 bg-white border-b sticky top-16 z-40 p-4 overflow-x-auto flex gap-3 hide-scrollbar">
        <button onclick="filter('All')" class="cat-pill active whitespace-nowrap px-6 py-2 rounded-full border text-xs font-black transition-all shadow-sm">All Items</button>
        <button onclick="filter('Ninjago')" class="cat-pill whitespace-nowrap px-6 py-2 rounded-full border text-xs font-black transition-all shadow-sm">Ninjago</button>
        <button onclick="filter('One Piece')" class="cat-pill whitespace-nowrap px-6 py-2 rounded-full border text-xs font-black transition-all shadow-sm">One Piece</button>
        <button onclick="filter('Anime')" class="cat-pill whitespace-nowrap px-6 py-2 rounded-full border text-xs font-black transition-all shadow-sm">Anime</button>
        <button onclick="filter('Marvel')" class="cat-pill whitespace-nowrap px-6 py-2 rounded-full border text-xs font-black transition-all shadow-sm">Marvel</button>
    </div>

    <!-- PRODUCT GRID -->
    <main class="max-w-7xl mx-auto px-4 py-8 pb-32">
        <div id="product-grid" class="grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-6">
            <!-- Loading placeholder -->
        </div>
    </main>

    <!-- TAOBAO SELECTION MODAL -->
    <div id="selection-modal" class="fixed inset-0 z-[60] flex items-end md:items-center justify-center p-0 md:p-4 hidden">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="closeModal()"></div>
        <div class="bg-white w-full max-w-lg rounded-t-[32px] md:rounded-[32px] overflow-hidden relative shadow-2xl animate-slide-up md:scale-100" id="modal-content">
            <button onclick="closeModal()" class="absolute top-4 right-4 w-10 h-10 bg-white/80 rounded-full flex items-center justify-center z-10 shadow-sm">
                <i class="fa-solid fa-xmark"></i>
            </button>
            <div id="modal-body" class="max-h-[85vh] overflow-y-auto"></div>
        </div>
    </div>

    <!-- CART PANEL (RETAINED) -->
    <div id="cart-panel" class="fixed inset-y-0 right-0 w-full max-w-sm bg-white shadow-2xl z-50 translate-x-full transition-transform duration-500 flex flex-col">
        <div class="p-6 border-b flex justify-between items-center bg-gray-50">
            <h2 class="font-black text-lg uppercase">Shopping Bag</h2>
            <button onclick="toggleCart()" class="text-gray-400"><i class="fa-solid fa-xmark text-xl"></i></button>
        </div>
        <div id="cart-items" class="flex-1 overflow-y-auto p-4 space-y-4"></div>
        <div class="p-6 border-t bg-gray-50 space-y-4">
            <div class="flex justify-between font-black items-end">
                <span class="text-gray-400 text-[10px] uppercase">Subtotal</span>
                <div class="text-right">
                    <div id="total-usd" class="text-2xl font-black text-black">$0.00</div>
                    <div id="total-khr" class="text-xs text-gray-500 font-bold">៛0</div>
                </div>
            </div>
            <button class="w-full bg-[#ff5000] text-white font-black py-4 rounded-2xl shadow-lg uppercase text-xs tracking-widest active:scale-95 transition-all">Checkout</button>
        </div>
    </div>

    <script>
        let allItems = [];
        let currentFilter = 'All';
        const RATE = 4000;

        async function loadStore() {
            const res = await fetch('/api/products/toy');
            allItems = await res.json();
            render();
        }

        function filter(c) {
            currentFilter = c;
            document.querySelectorAll('.cat-pill').forEach(b => b.classList.toggle('active', b.innerText.includes(c)));
            render();
        }

        function render() {
            const grid = document.getElementById('product-grid');
            const data = currentFilter === 'All' ? allItems : allItems.filter(i => i.category === currentFilter);
            grid.innerHTML = '';
            
            data.forEach(p => {
                const soldOut = p.stock <= 0;
                grid.innerHTML += `
                    <div class="bg-white rounded-[24px] border border-gray-100 overflow-hidden group shadow-sm hover:shadow-md transition-all cursor-pointer ${soldOut ? 'opacity-60' : ''}" onclick='openSelection(${JSON.stringify(p)})'>
                        <div class="aspect-square relative overflow-hidden bg-gray-50">
                            <img src="${p.thumbnail}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700">
                            ${soldOut ? '<div class="absolute inset-0 bg-black/40 flex items-center justify-center text-white font-black text-xs uppercase">Sold Out</div>' : ''}
                            ${p.variants.length > 1 ? `<div class="absolute top-2 right-2 bg-white/90 backdrop-blur px-2 py-1 rounded-lg text-[8px] font-black">${p.variants.length} STYLES</div>` : ''}
                        </div>
                        <div class="p-4">
                            <span class="text-[8px] font-black text-[#ff5000] uppercase tracking-widest">${p.category}</span>
                            <h3 class="font-bold text-sm text-gray-800 line-clamp-1 mt-0.5">${p.title}</h3>
                            <div class="mt-2 flex justify-between items-end">
                                <div class="flex flex-col">
                                    <span class="font-black text-lg">$${p.price.toFixed(2)}</span>
                                    <span class="text-[9px] font-bold text-gray-400 leading-none">៛${(p.price * RATE).toLocaleString()}</span>
                                </div>
                                <div class="w-8 h-8 bg-gray-50 rounded-full flex items-center justify-center text-[#ff5000] group-hover:bg-black group-hover:text-white transition-all"><i class="fa-solid fa-plus text-xs"></i></div>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        let selectedItem = null, variantIdx = 0, qty = 1;

        function openSelection(p) {
            if(p.stock <= 0) return;
            selectedItem = p; variantIdx = 0; qty = 1;
            document.getElementById('selection-modal').classList.remove('hidden');
            updateModal();
        }

        function closeModal() { document.getElementById('selection-modal').classList.add('hidden'); }

        function updateModal() {
            const v = selectedItem.variants[variantIdx];
            const body = document.getElementById('modal-body');
            body.innerHTML = `
                <div class="p-0">
                    <img src="${v.image}" class="w-full aspect-square object-cover bg-gray-50">
                    <div class="p-6 space-y-6">
                        <div class="flex justify-between items-start">
                            <div>
                                <span class="text-[10px] font-black text-[#ff5000] uppercase tracking-widest">${selectedItem.category}</span>
                                <h2 class="text-xl font-black text-gray-900 mt-1">${selectedItem.title}</h2>
                                <p class="text-xs font-bold text-gray-400 mt-1">Option: ${v.name}</p>
                            </div>
                            <div class="text-right">
                                <div class="text-2xl font-black text-[#ff5000]">$${v.price.toFixed(2)}</div>
                                <div class="text-xs font-bold text-gray-400">៛${(v.price * RATE).toLocaleString()}</div>
                            </div>
                        </div>

                        <!-- STYLE SELECTOR (TAOBAO STYLE) -->
                        <div class="space-y-3">
                            <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest">Select Style</label>
                            <div class="flex flex-wrap gap-3">
                                ${selectedItem.variants.map((varItem, idx) => `
                                    <button onclick="variantIdx=${idx};updateModal()" class="variant-pill w-14 h-14 rounded-2xl border-2 transition-all overflow-hidden relative ${variantIdx === idx ? 'variant-pill active' : 'border-gray-100 opacity-60'}">
                                        <img src="${varItem.image}" class="w-full h-full object-cover">
                                        ${variantIdx === idx ? '<div class="absolute bottom-0 right-0 bg-[#ff5000] text-white p-0.5"><i class="fa-solid fa-check text-[6px]"></i></div>' : ''}
                                    </button>
                                `).join('')}
                            </div>
                        </div>

                        <!-- QUANTITY & ADD -->
                        <div class="flex items-center justify-between pt-6 border-t border-gray-100">
                            <div class="flex items-center gap-4 bg-gray-100 rounded-2xl px-4 py-2">
                                <button onclick="qty=Math.max(1,qty-1);updateModal()" class="text-xl font-black w-6">-</button>
                                <span class="text-sm font-black w-4 text-center">${qty}</span>
                                <button onclick="qty++;updateModal()" class="text-xl font-black w-6">+</button>
                            </div>
                            <button onclick="addToBag()" class="flex-1 ml-4 bg-[#ff5000] text-white font-black py-4 rounded-2xl shadow-xl shadow-orange-100 uppercase text-xs tracking-widest active:scale-95 transition-all">
                                Add to Bag
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        let cart = [];
        function addToBag() {
            const v = selectedItem.variants[variantIdx];
            const cartId = `${selectedItem.id}-${variantIdx}`;
            const ex = cart.find(i => i.cartId === cartId);
            if(ex) ex.qty += qty; 
            else cart.push({cartId, title: selectedItem.title, style: v.name, price: v.price, image: v.image, qty});
            
            updateCart(); closeModal(); toggleCart();
        }

        function toggleCart() { document.getElementById('cart-panel').classList.toggle('translate-x-full'); }

        function updateCart() {
            const list = document.getElementById('cart-items');
            const totalUSD = document.getElementById('total-usd');
            const totalKHR = document.getElementById('total-khr');
            const badge = document.getElementById('cart-badge');
            
            list.innerHTML = ''; let t = 0, c = 0;
            cart.forEach((item, idx) => {
                t += item.price * item.qty; c += item.qty;
                list.innerHTML += `
                    <div class="flex gap-4 items-center bg-gray-50 p-3 rounded-[20px] border border-gray-100">
                        <img src="${item.image}" class="w-14 h-14 rounded-xl object-cover border">
                        <div class="flex-1">
                            <h4 class="font-black text-xs text-gray-800">${item.title}</h4>
                            <p class="text-[9px] font-bold text-gray-400 mt-0.5">${item.style}</p>
                            <div class="flex justify-between items-center mt-1">
                                <span class="font-black text-sm">$${item.price.toFixed(2)}</span>
                                <span class="text-[10px] font-black text-gray-400">Qty: ${item.qty}</span>
                            </div>
                        </div>
                        <button onclick="cart.splice(${idx},1);updateCart()" class="text-gray-300 hover:text-red-500"><i class="fa-solid fa-trash-can"></i></button>
                    </div>
                `;
            });
            totalUSD.innerText = `$${t.toFixed(2)}`;
            totalKHR.innerText = `៛${(t * RATE).toLocaleString()}`;
            badge.innerText = c;
        }

        window.onload = loadStore;
    </script>
</body>
</html>
