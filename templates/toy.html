<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toy Universe | Somphea Reak Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #ffffff; }
        .product-card:hover .hover-image { opacity: 1; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="overflow-x-hidden">

    <!-- NAVBAR -->
    <nav class="fixed top-0 w-full bg-white/80 backdrop-blur-md z-40 border-b border-gray-100">
        <div class="max-w-7xl mx-auto px-4 h-16 flex justify-between items-center">
            <a href="/" class="flex items-center gap-2">
                <div class="w-8 h-8 bg-black rounded flex items-center justify-center text-white font-black text-sm shadow-lg">S</div>
                <span class="font-black text-lg tracking-tighter">TOY UNIVERSE</span>
            </a>
            
            <button onclick="toggleCart()" class="relative p-2 hover:bg-gray-50 rounded-full transition-colors">
                <i class="fa-solid fa-cart-shopping text-xl"></i>
                <span id="cart-count-badge" class="absolute -top-1 -right-1 bg-orange-500 text-white text-[10px] font-bold w-5 h-5 flex items-center justify-center rounded-full shadow-md">0</span>
            </button>
        </div>
    </nav>

    <!-- HERO SECTION -->
    <header class="pt-24 pb-12 px-4 text-center">
        <h1 class="text-4xl md:text-5xl font-black mb-4 tracking-tight">THE COLLECTION</h1>
        <p class="text-gray-500 font-bold text-sm uppercase tracking-widest">Hand-picked toys from the studio</p>
    </header>

    <!-- LOADING STATE -->
    <div id="loading-spinner" class="flex flex-col items-center justify-center py-20">
        <div class="w-10 h-10 border-4 border-gray-200 border-t-black rounded-full animate-spin"></div>
        <p class="text-xs font-bold text-gray-400 mt-4 uppercase tracking-widest">Syncing with Cloud...</p>
    </div>

    <!-- DYNAMIC PRODUCT GRID -->
    <main class="max-w-7xl mx-auto px-4 pb-20">
        <div id="product-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 md:gap-8">
            <!-- Products from Admin Panel will appear here automatically -->
        </div>
    </main>

    <!-- SLIDING CART PANEL (KEPT YOUR SYSTEM) -->
    <div id="cart-panel" class="fixed inset-y-0 right-0 w-full max-w-md bg-white shadow-2xl z-50 translate-x-full transition-transform duration-500 ease-in-out border-l border-gray-100 flex flex-col">
        <div class="p-6 border-b border-gray-100 flex justify-between items-center bg-gray-50">
            <h2 class="font-black text-xl flex items-center gap-2"><i class="fa-solid fa-shopping-bag"></i> YOUR CART</h2>
            <button onclick="toggleCart()" class="w-10 h-10 flex items-center justify-center hover:bg-white rounded-full transition-all text-gray-400 hover:text-black">
                <i class="fa-solid fa-xmark text-xl"></i>
            </button>
        </div>

        <div id="cart-items" class="flex-1 overflow-y-auto p-6 space-y-4">
            <!-- Cart items added here -->
        </div>

        <div class="p-6 border-t border-gray-100 bg-gray-50 space-y-4">
            <div class="flex justify-between items-center mb-2">
                <span class="text-gray-400 font-bold text-sm">SUBTOTAL</span>
                <span id="cart-total" class="text-2xl font-black text-black">$0.00</span>
            </div>
            <button class="w-full bg-black text-white font-black py-5 rounded-2xl shadow-xl hover:bg-gray-800 transition-all flex items-center justify-center gap-3 active:scale-95">
                CHECKOUT NOW <i class="fa-solid fa-arrow-right"></i>
            </button>
        </div>
    </div>

    <!-- OVERLAY -->
    <div id="overlay" onclick="toggleCart()" class="fixed inset-0 bg-black/40 backdrop-blur-sm z-40 hidden opacity-0 transition-opacity duration-500"></div>

    <script>
        // --- 1. THE BRAIN: SYNC WITH ADMIN PANEL ---
        async function fetchProducts() {
            const grid = document.getElementById('product-grid');
            const spinner = document.getElementById('loading-spinner');

            try {
                // We ask the API for products in the "toy" store
                const response = await fetch('/api/products/toy');
                const products = await response.json();

                spinner.classList.add('hidden');
                grid.innerHTML = '';

                if (products.length === 0) {
                    grid.innerHTML = `
                        <div class="col-span-full py-20 text-center">
                            <i class="fa-solid fa-box-open text-4xl text-gray-200 mb-4"></i>
                            <p class="font-bold text-gray-400">No toys in the collection yet.</p>
                        </div>
                    `;
                    return;
                }

                products.forEach(p => {
                    const price = p.variants && p.variants.length > 0 ? p.variants[0].price : 0;
                    
                    // Generate HTML for each product card
                    const card = `
                        <div class="product-card group bg-white rounded-3xl overflow-hidden border border-gray-100 hover:border-gray-200 transition-all duration-500 hover:shadow-xl hover:-translate-y-1">
                            <div class="relative aspect-square overflow-hidden bg-gray-50">
                                <img src="${p.thumbnail}" alt="${p.title}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
                                
                                <!-- Multi-Image Gallery Hint (If more than 1 image) -->
                                ${p.variants.length > 1 ? `
                                    <div class="absolute top-3 right-3 bg-white/90 backdrop-blur px-2 py-1 rounded-lg text-[8px] font-black shadow-sm flex items-center gap-1">
                                        <i class="fa-solid fa-images"></i> ${p.variants.length} VIEWS
                                    </div>
                                ` : ''}

                                <div class="absolute inset-0 bg-black/20 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center gap-2 p-4">
                                    <button onclick='addToCart(${JSON.stringify(p)})' class="w-full bg-white text-black font-black py-3 rounded-xl shadow-lg transform translate-y-4 group-hover:translate-y-0 transition-all duration-500 text-xs">
                                        QUICK ADD +
                                    </button>
                                </div>
                            </div>
                            
                            <div class="p-4 md:p-6">
                                <span class="text-[9px] font-bold text-orange-500 bg-orange-50 px-2 py-1 rounded-full uppercase tracking-widest">${p.category}</span>
                                <h3 class="font-black text-gray-900 mt-2 text-sm md:text-base line-clamp-1">${p.title}</h3>
                                <div class="flex justify-between items-center mt-3">
                                    <span class="font-black text-lg">$${parseFloat(price).toFixed(2)}</span>
                                    <span class="text-[10px] font-bold text-gray-400">${p.sold}</span>
                                </div>
                            </div>
                        </div>
                    `;
                    grid.innerHTML += card;
                });
            } catch (error) {
                console.error("Error fetching toys:", error);
                spinner.innerHTML = `<p class="text-red-500 font-bold">Failed to load products. Check your Render Environment Keys!</p>`;
            }
        }

        // --- 2. THE HEART: CART SYSTEM (KEPT YOUR LOGIC) ---
        let cart = [];

        function toggleCart() {
            const panel = document.getElementById('cart-panel');
            const overlay = document.getElementById('overlay');
            const isClosing = !panel.classList.contains('translate-x-full');

            if (isClosing) {
                panel.classList.add('translate-x-full');
                overlay.classList.add('opacity-0');
                setTimeout(() => {
                    overlay.classList.add('hidden');
                    document.body.style.overflow = '';
                }, 500);
            } else {
                overlay.classList.remove('hidden');
                setTimeout(() => overlay.classList.remove('opacity-0'), 10);
                panel.classList.remove('translate-x-full');
                document.body.style.overflow = 'hidden';
            }
        }

        function addToCart(product) {
            // Check if product already in cart
            const existing = cart.find(item => item.id === product.id);
            const price = product.variants && product.variants.length > 0 ? product.variants[0].price : 0;

            if (existing) {
                existing.qty++;
            } else {
                cart.push({
                    id: product.id,
                    title: product.title,
                    price: price,
                    image: product.thumbnail,
                    qty: 1
                });
            }
            updateCartUI();
            
            // Animation for visual feedback
            const badge = document.getElementById('cart-count-badge');
            badge.classList.add('scale-150');
            setTimeout(() => badge.classList.remove('scale-150'), 300);
            
            // Auto open cart to show customer it was added
            setTimeout(() => toggleCart(), 400);
        }

        function removeFromCart(id) {
            cart = cart.filter(item => item.id !== id);
            updateCartUI();
        }

        function updateCartUI() {
            const container = document.getElementById('cart-items');
            const totalEl = document.getElementById('cart-total');
            const badge = document.getElementById('cart-count-badge');
            
            container.innerHTML = '';
            let total = 0;
            let count = 0;

            cart.forEach(item => {
                total += item.price * item.qty;
                count += item.qty;
                
                container.innerHTML += `
                    <div class="flex gap-4 items-center bg-white p-3 rounded-2xl border border-gray-100 shadow-sm animate-fade-in">
                        <img src="${item.image}" class="w-16 h-16 rounded-xl object-cover border">
                        <div class="flex-1">
                            <h4 class="font-black text-sm text-gray-900">${item.title}</h4>
                            <p class="text-xs font-bold text-gray-400">$${item.price.toFixed(2)} x ${item.qty}</p>
                        </div>
                        <button onclick="removeFromCart(${item.id})" class="text-red-400 hover:text-red-600 transition-colors p-2">
                            <i class="fa-solid fa-trash-can"></i>
                        </button>
                    </div>
                `;
            });

            totalEl.innerText = `$${total.toFixed(2)}`;
            badge.innerText = count;
            
            if (cart.length === 0) {
                container.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-full text-gray-300">
                        <i class="fa-solid fa-bag-shopping text-4xl mb-3 opacity-20"></i>
                        <p class="font-bold text-xs uppercase tracking-widest">Cart is empty</p>
                    </div>
                `;
            }
        }

        // Initialize on load
        window.onload = fetchProducts;
    </script>
</body>
</html>
