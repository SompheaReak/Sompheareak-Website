<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Somphea Reak | Toy Universe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Kantumruy+Pro:wght@400;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f9fafb; }
        .khmer { font-family: 'Kantumruy Pro', sans-serif; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .cat-pill.active { background: #000; color: #fff; }
    </style>
</head>
<body class="pb-20">

    <!-- NAV -->
    <nav class="fixed top-0 w-full bg-white/90 backdrop-blur-xl z-50 border-b h-16 flex items-center px-4 justify-between">
        <div class="flex items-center gap-3">
            <a href="/" class="w-9 h-9 flex items-center justify-center rounded-full bg-gray-50 hover:bg-black hover:text-white transition-all"><i class="fa-solid fa-house"></i></a>
            <div class="flex flex-col leading-none">
                <span class="khmer font-bold text-gray-900 text-sm">សម្ភារៈ</span>
                <span class="text-[10px] font-black text-gray-400 tracking-tighter uppercase">Somphea Reak</span>
            </div>
        </div>
        <button onclick="toggleCart()" class="relative w-10 h-10 flex items-center justify-center rounded-full bg-gray-50">
            <i class="fa-solid fa-cart-shopping"></i>
            <span id="cart-badge" class="absolute -top-1 -right-1 bg-red-500 text-white text-[9px] font-black w-4 h-4 rounded-full flex items-center justify-center">0</span>
        </button>
    </nav>

    <!-- FILTER BAR -->
    <div class="mt-16 bg-white border-b sticky top-16 z-40 overflow-x-auto flex gap-2 p-4 hide-scrollbar">
        <button onclick="filter('All')" class="cat-pill active whitespace-nowrap px-6 py-2 rounded-full border text-xs font-bold transition-all">All</button>
        <button onclick="filter('Ninjago')" class="cat-pill whitespace-nowrap px-6 py-2 rounded-full border text-xs font-bold transition-all">Ninjago</button>
        <button onclick="filter('One Piece')" class="cat-pill whitespace-nowrap px-6 py-2 rounded-full border text-xs font-bold transition-all">One Piece</button>
        <button onclick="filter('Anime')" class="cat-pill whitespace-nowrap px-6 py-2 rounded-full border text-xs font-bold transition-all">Anime</button>
        <button onclick="filter('Marvel')" class="cat-pill whitespace-nowrap px-6 py-2 rounded-full border text-xs font-bold transition-all">Marvel</button>
    </div>

    <!-- GRID -->
    <main class="max-w-7xl mx-auto px-4 py-8">
        <div id="grid" class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <!-- Products load here -->
        </div>
    </main>

    <!-- PRODUCT MODAL -->
    <div id="modal" class="fixed inset-0 z-[60] flex items-center justify-center p-4 hidden">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="closeModal()"></div>
        <div class="bg-white w-full max-w-md rounded-3xl overflow-hidden relative shadow-2xl">
            <div id="modal-content" class="max-h-[90vh] overflow-y-auto pb-6">
                <!-- Content loads here -->
            </div>
        </div>
    </div>

    <!-- CART PANEL -->
    <div id="cart" class="fixed inset-y-0 right-0 w-full max-w-sm bg-white shadow-2xl z-50 translate-x-full transition-transform duration-500 border-l flex flex-col">
        <div class="p-6 border-b flex justify-between items-center">
            <h2 class="font-black text-lg uppercase">Shopping Bag</h2>
            <button onclick="toggleCart()" class="text-gray-400"><i class="fa-solid fa-xmark text-xl"></i></button>
        </div>
        <div id="cart-items" class="flex-1 overflow-y-auto p-4 space-y-4"></div>
        <div class="p-6 border-t bg-gray-50 space-y-4">
            <div class="flex justify-between font-black">
                <span class="text-gray-400 text-xs">SUBTOTAL</span>
                <div class="text-right">
                    <div id="total-usd" class="text-xl">$0.00</div>
                    <div id="total-khr" class="text-[10px] text-gray-500 font-bold">៛0</div>
                </div>
            </div>
            <button class="w-full bg-black text-white font-black py-4 rounded-xl shadow-lg active:scale-95 transition-all uppercase text-xs tracking-widest">Order Now</button>
        </div>
    </div>

    <script>
        let products = [];
        let currentCat = 'All';
        const RATE = 4000;

        async function load() {
            const res = await fetch('/api/products/toy');
            products = await res.json();
            render();
        }

        function filter(c) {
            currentCat = c;
            document.querySelectorAll('.cat-pill').forEach(b => b.classList.toggle('active', b.innerText === c));
            render();
        }

        function render() {
            const grid = document.getElementById('grid');
            const data = currentCat === 'All' ? products : products.filter(p => p.category === currentCat);
            grid.innerHTML = data.length ? '' : '<div class="col-span-full py-20 text-center font-bold text-gray-300">Nothing found here.</div>';
            
            data.forEach(p => {
                const soldOut = p.stock <= 0;
                grid.innerHTML += `
                    <div class="bg-white rounded-2xl border border-gray-100 overflow-hidden shadow-sm hover:shadow-md transition-all cursor-pointer ${soldOut ? 'opacity-60 grayscale' : ''}" onclick='openModal(${JSON.stringify(p)})'>
                        <div class="aspect-square relative overflow-hidden bg-gray-50">
                            <img src="${p.thumbnail}" class="w-full h-full object-cover">
                            ${soldOut ? '<div class="absolute inset-0 flex items-center justify-center font-black text-white bg-black/40 text-xs">SOLD OUT</div>' : ''}
                        </div>
                        <div class="p-3">
                            <h3 class="font-bold text-xs text-gray-800 truncate">${p.title}</h3>
                            <div class="mt-2 flex justify-between items-end">
                                <div class="flex flex-col">
                                    <span class="font-black text-sm">$${p.price.toFixed(2)}</span>
                                    <span class="text-[9px] font-bold text-gray-400 leading-none">៛${(p.price * RATE).toLocaleString()}</span>
                                </div>
                                <div class="w-7 h-7 bg-gray-50 rounded-full flex items-center justify-center text-gray-300 text-[10px]"><i class="fa-solid fa-plus"></i></div>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        let currentP = null, variantIdx = 0, qty = 1;
        function openModal(p) {
            if(p.stock <= 0) return;
            currentP = p; variantIdx = 0; qty = 1;
            document.getElementById('modal').classList.remove('hidden');
            updateModal();
        }

        function closeModal() { document.getElementById('modal').classList.add('hidden'); }

        function updateModal() {
            const v = currentP.variants[variantIdx];
            document.getElementById('modal-content').innerHTML = `
                <img src="${v.image}" class="w-full aspect-square object-cover">
                <div class="p-6">
                    <span class="text-[10px] font-black text-red-500 uppercase">${currentP.category}</span>
                    <h2 class="text-xl font-black text-gray-900 mt-1">${currentP.title}</h2>
                    <div class="flex items-baseline gap-2 mt-2">
                        <span class="text-2xl font-black">$${v.price.toFixed(2)}</span>
                        <span class="text-xs font-bold text-gray-400">៛${(v.price * RATE).toLocaleString()}</span>
                    </div>
                    <div class="mt-6">
                        <label class="text-[10px] font-black text-gray-400 uppercase">Variants</label>
                        <div class="flex gap-2 mt-2">
                            ${currentP.variants.map((v, i) => `<button onclick="variantIdx=${i};updateModal()" class="w-12 h-12 rounded-xl border-2 overflow-hidden ${variantIdx===i?'border-black':'border-gray-100 opacity-50'}"><img src="${v.image}" class="w-full h-full object-cover"></button>`).join('')}
                        </div>
                    </div>
                    <div class="mt-8 flex items-center justify-between border-t pt-6">
                        <div class="flex items-center gap-3 bg-gray-100 rounded-xl px-3 py-2">
                            <button onclick="qty=Math.max(1,qty-1);updateModal()" class="font-black w-6 text-lg">-</button>
                            <span class="font-black w-4 text-center text-sm">${qty}</span>
                            <button onclick="qty++;updateModal()" class="font-black w-6 text-lg">+</button>
                        </div>
                        <button onclick="add()" class="bg-black text-white font-black px-8 py-4 rounded-2xl shadow-lg uppercase text-xs tracking-widest">Add to Bag</button>
                    </div>
                </div>
            `;
        }

        let cart = [];
        function add() {
            const v = currentP.variants[variantIdx];
            const id = `${currentP.id}-${variantIdx}`;
            const ex = cart.find(i => i.cartId === id);
            if(ex) ex.qty += qty; else cart.push({cartId:id, title:currentP.title, price:v.price, image:v.image, qty});
            closeModal(); updateCart(); toggleCart();
        }

        function toggleCart() { document.getElementById('cart').classList.toggle('translate-x-full'); }

        function updateCart() {
            const list = document.getElementById('cart-items');
            list.innerHTML = ''; let t = 0, c = 0;
            cart.forEach((i, idx) => {
                t += i.price * i.qty; c += i.qty;
                list.innerHTML += `<div class="flex gap-4 items-center bg-gray-50 p-3 rounded-2xl border border-gray-100"><img src="${i.image}" class="w-14 h-14 rounded-xl object-cover border"><div class="flex-1"><h4 class="font-black text-xs text-gray-800">${i.title}</h4><p class="font-black text-sm mt-1">$${i.price.toFixed(2)} x ${i.qty}</p></div><button onclick="cart.splice(${idx},1);updateCart()" class="text-gray-300 hover:text-red-500"><i class="fa-solid fa-trash-can"></i></button></div>`;
            });
            document.getElementById('total-usd').innerText = `$${t.toFixed(2)}`;
            document.getElementById('total-khr').innerText = `៛${(t * RATE).toLocaleString()}`;
            document.getElementById('cart-badge').innerText = c;
        }

        window.onload = load;
    </script>
</body>
</html>
