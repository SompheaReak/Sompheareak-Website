<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Somphea Reak | Toy Universe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Kantumruy+Pro:wght@400;700&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f9fafb; 
        }
        .khmer-font { font-family: 'Kantumruy Pro', sans-serif; }
        
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .category-pill.active {
            background-color: #000;
            color: #fff;
        }
        
        /* Modal Animation */
        .modal-enter { opacity: 0; transform: scale(0.95); }
        .modal-enter-active { opacity: 1; transform: scale(1); transition: all 0.3s ease-out; }
    </style>
</head>
<body class="overflow-x-hidden">

    <!-- 1 & 2. NAVIGATION & LOGO -->
    <nav class="fixed top-0 w-full bg-white/90 backdrop-blur-xl z-40 border-b border-gray-100">
        <div class="max-w-7xl mx-auto px-4 h-16 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <!-- Home Button -->
                <a href="/" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-gray-100 transition-colors text-gray-800">
                    <i class="fa-solid fa-house text-lg"></i>
                </a>
                <!-- Shop Logo & Name -->
                <div class="flex flex-col leading-tight">
                    <span class="khmer-font font-bold text-gray-900 text-sm">សម្ភារៈ</span>
                    <span class="font-extrabold text-xs text-gray-400 tracking-tighter">SOMPHEA REAK</span>
                </div>
            </div>
            
            <button onclick="toggleCart()" class="relative w-10 h-10 flex items-center justify-center rounded-full bg-gray-50">
                <i class="fa-solid fa-cart-shopping text-gray-700"></i>
                <span id="cart-count-badge" class="absolute -top-1 -right-1 bg-red-500 text-white text-[9px] font-black w-4 h-4 flex items-center justify-center rounded-full">0</span>
            </button>
        </div>
    </nav>

    <!-- 3. CATEGORY FILTER BAR -->
    <div class="mt-16 bg-white border-b border-gray-100 sticky top-16 z-30">
        <div class="max-w-7xl mx-auto flex items-center gap-2 overflow-x-auto p-4 hide-scrollbar">
            <button onclick="filterCategory('All')" class="category-pill active whitespace-nowrap px-5 py-2 rounded-full text-xs font-bold border border-gray-100 transition-all">All</button>
            <button onclick="filterCategory('Ninjago')" class="category-pill whitespace-nowrap px-5 py-2 rounded-full text-xs font-bold border border-gray-100 transition-all">Ninjago</button>
            <button onclick="filterCategory('One Piece')" class="category-pill whitespace-nowrap px-5 py-2 rounded-full text-xs font-bold border border-gray-100 transition-all">One Piece</button>
            <button onclick="filterCategory('Anime')" class="category-pill whitespace-nowrap px-5 py-2 rounded-full text-xs font-bold border border-gray-100 transition-all">Anime</button>
            <button onclick="filterCategory('Marvel')" class="category-pill whitespace-nowrap px-5 py-2 rounded-full text-xs font-bold border border-gray-100 transition-all">Marvel</button>
            <button onclick="filterCategory('Other')" class="category-pill whitespace-nowrap px-5 py-2 rounded-full text-xs font-bold border border-gray-100 transition-all">Other</button>
        </div>
    </div>

    <!-- 4 & 5. PRODUCT GRID -->
    <main class="max-w-7xl mx-auto px-4 py-8 pb-32">
        <div id="product-grid" class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <!-- Loading State -->
            <div class="col-span-full py-20 text-center">
                <div class="inline-block w-8 h-8 border-4 border-gray-200 border-t-black rounded-full animate-spin"></div>
            </div>
        </div>
    </main>

    <!-- PRODUCT QUICK VIEW MODAL (For Variant Selection & Quantity) -->
    <div id="product-modal" class="fixed inset-0 z-[60] flex items-center justify-center p-4 hidden">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="closeModal()"></div>
        <div class="bg-white w-full max-w-lg rounded-3xl overflow-hidden relative shadow-2xl modal-enter" id="modal-content">
            <button onclick="closeModal()" class="absolute top-4 right-4 w-10 h-10 bg-white/80 backdrop-blur rounded-full flex items-center justify-center shadow-lg z-10">
                <i class="fa-solid fa-xmark"></i>
            </button>
            
            <!-- Modal Body (Dynamic) -->
            <div id="modal-body" class="max-h-[85vh] overflow-y-auto">
                <!-- Content injected here -->
            </div>
        </div>
    </div>

    <!-- CART PANEL (RETAINED) -->
    <div id="cart-panel" class="fixed inset-y-0 right-0 w-full max-w-sm bg-white shadow-2xl z-50 translate-x-full transition-transform duration-500 flex flex-col">
        <div class="p-6 border-b flex justify-between items-center bg-gray-50">
            <h2 class="font-black text-lg uppercase tracking-tighter">Your Bag</h2>
            <button onclick="toggleCart()" class="text-gray-400"><i class="fa-solid fa-xmark text-xl"></i></button>
        </div>
        <div id="cart-items" class="flex-1 overflow-y-auto p-4 space-y-4"></div>
        <div class="p-6 border-t bg-gray-50 space-y-4">
            <div class="flex justify-between font-black items-end">
                <span class="text-gray-400 text-[10px] uppercase">Subtotal</span>
                <div class="text-right leading-none">
                    <div id="cart-total-usd" class="text-xl">$0.00</div>
                    <div id="cart-total-khr" class="text-[10px] text-gray-500 font-bold">៛0</div>
                </div>
            </div>
            <button onclick="alert('Proceeding to checkout...')" class="w-full bg-black text-white font-black py-4 rounded-xl shadow-lg uppercase text-xs tracking-widest active:scale-95 transition-all">Checkout</button>
        </div>
    </div>

    <script>
        let allProducts = [];
        let currentFilter = 'All';
        const KHR_RATE = 4000;

        // Fetch Data from your Admin Panel API
        async function fetchProducts() {
            try {
                const res = await fetch('/api/products/toy');
                allProducts = await res.json();
                renderProducts();
            } catch (err) {
                console.error("Fetch error:", err);
            }
        }

        function renderProducts() {
            const grid = document.getElementById('product-grid');
            const filtered = currentFilter === 'All' 
                ? allProducts 
                : allProducts.filter(p => p.category === currentFilter);
            
            grid.innerHTML = filtered.length === 0 
                ? '<div class="col-span-full py-10 text-center text-gray-400 font-bold">No items found in this category.</div>'
                : '';

            filtered.forEach(p => {
                const khr = (p.price * KHR_RATE).toLocaleString();
                const card = `
                    <div class="bg-white rounded-2xl border border-gray-100 overflow-hidden group shadow-sm hover:shadow-md transition-all cursor-pointer" onclick='openModal(${JSON.stringify(p)})'>
                        <div class="aspect-square relative overflow-hidden bg-gray-100">
                            <img src="${p.thumbnail}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
                            ${p.variants.length > 1 ? `
                                <div class="absolute top-2 right-2 bg-black/60 backdrop-blur px-2 py-1 rounded-lg text-[8px] text-white font-black">
                                    ${p.variants.length} OPTIONS
                                </div>
                            ` : ''}
                        </div>
                        <div class="p-3">
                            <h3 class="font-extrabold text-xs text-gray-800 line-clamp-1">${p.title}</h3>
                            <div class="mt-2 flex items-center justify-between">
                                <div class="flex flex-col">
                                    <span class="font-black text-sm">$${p.price.toFixed(2)}</span>
                                    <span class="text-[9px] font-bold text-gray-400 leading-none">៛${khr}</span>
                                </div>
                                <button class="w-7 h-7 bg-gray-50 rounded-full flex items-center justify-center text-gray-400 hover:bg-black hover:text-white transition-all">
                                    <i class="fa-solid fa-plus text-[10px]"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                `;
                grid.innerHTML += card;
            });
        }

        // --- 3. FILTERING LOGIC ---
        function filterCategory(cat) {
            currentFilter = cat;
            document.querySelectorAll('.category-pill').forEach(btn => {
                btn.classList.toggle('active', btn.innerText === cat);
            });
            renderProducts();
        }

        // --- 4. QUICK VIEW MODAL (VARIANT SELECTION & QUANTITY) ---
        let selectedProduct = null;
        let selectedVariantIndex = 0;
        let quantity = 1;

        function openModal(product) {
            selectedProduct = product;
            selectedVariantIndex = 0;
            quantity = 1;
            
            const modal = document.getElementById('product-modal');
            const content = document.getElementById('modal-content');
            modal.classList.remove('hidden');
            setTimeout(() => content.classList.add('modal-enter-active'), 10);
            updateModalUI();
        }

        function closeModal() {
            const modal = document.getElementById('product-modal');
            const content = document.getElementById('modal-content');
            content.classList.remove('modal-enter-active');
            setTimeout(() => modal.classList.add('hidden'), 300);
        }

        function updateModalUI() {
            const body = document.getElementById('modal-body');
            const v = selectedProduct.variants[selectedVariantIndex];
            const khr = (v.price * KHR_RATE).toLocaleString();

            body.innerHTML = `
                <div class="p-0">
                    <img src="${v.image}" class="w-full aspect-square object-cover bg-gray-100">
                    <div class="p-6">
                        <span class="text-[10px] font-black text-red-500 uppercase tracking-widest">${selectedProduct.category}</span>
                        <h2 class="text-xl font-black text-gray-900 mt-1">${selectedProduct.title}</h2>
                        
                        <div class="flex items-end gap-3 mt-3">
                            <span class="text-2xl font-black">$${v.price.toFixed(2)}</span>
                            <span class="text-sm font-bold text-gray-400 mb-1">៛${khr}</span>
                        </div>

                        <!-- 4. Variant Selection -->
                        ${selectedProduct.variants.length > 1 ? `
                            <div class="mt-6">
                                <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest">Select Style</label>
                                <div class="flex flex-wrap gap-2 mt-2">
                                    ${selectedProduct.variants.map((variant, idx) => `
                                        <button onclick="selectVariant(${idx})" class="w-12 h-12 rounded-xl border-2 transition-all overflow-hidden ${selectedVariantIndex === idx ? 'border-black' : 'border-gray-100 opacity-50'}">
                                            <img src="${variant.image}" class="w-full h-full object-cover">
                                        </button>
                                    `).join('')}
                                </div>
                            </div>
                        ` : ''}

                        <!-- 6. Quantity Selection -->
                        <div class="mt-6 flex items-center justify-between border-t border-gray-100 pt-6">
                            <div class="flex items-center gap-4">
                                <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest">Quantity</label>
                                <div class="flex items-center gap-3 bg-gray-100 rounded-xl px-3 py-2">
                                    <button onclick="changeQty(-1)" class="w-6 h-6 flex items-center justify-center font-black hover:text-red-500">-</button>
                                    <span class="text-sm font-black w-4 text-center">${quantity}</span>
                                    <button onclick="changeQty(1)" class="w-6 h-6 flex items-center justify-center font-black hover:text-green-500">+</button>
                                </div>
                            </div>
                            
                            <button onclick="addItemToCart()" class="bg-black text-white font-black px-8 py-4 rounded-2xl shadow-xl active:scale-95 transition-all text-sm uppercase tracking-widest">
                                Add to Bag
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        function selectVariant(idx) {
            selectedVariantIndex = idx;
            updateModalUI();
        }

        function changeQty(amt) {
            quantity = Math.max(1, quantity + amt);
            updateModalUI();
        }

        // --- 7. CART SYSTEM ---
        let cart = [];

        function toggleCart() {
            const p = document.getElementById('cart-panel');
            p.classList.toggle('translate-x-full');
        }

        function addItemToCart() {
            const variant = selectedProduct.variants[selectedVariantIndex];
            
            // Generate a unique ID for variant-level items
            const cartId = `${selectedProduct.id}-${selectedVariantIndex}`;
            const existing = cart.find(i => i.cartId === cartId);

            if (existing) {
                existing.qty += quantity;
            } else {
                cart.push({
                    cartId: cartId,
                    id: selectedProduct.id,
                    title: selectedProduct.title,
                    variantName: variant.name,
                    price: variant.price,
                    image: variant.image,
                    qty: quantity
                });
            }

            closeModal();
            updateCartUI();
            toggleCart();
        }

        function updateCartUI() {
            const cont = document.getElementById('cart-items');
            const tUSD = document.getElementById('cart-total-usd');
            const tKHR = document.getElementById('cart-total-khr');
            const badge = document.getElementById('cart-count-badge');
            
            cont.innerHTML = '';
            let total = 0;
            let count = 0;

            cart.forEach((item, index) => {
                total += item.price * item.qty;
                count += item.qty;
                cont.innerHTML += `
                    <div class="flex gap-4 items-center bg-gray-50 p-3 rounded-2xl border border-gray-100 relative">
                        <img src="${item.image}" class="w-14 h-14 rounded-xl object-cover border">
                        <div class="flex-1">
                            <h4 class="font-black text-xs text-gray-800">${item.title}</h4>
                            <p class="text-[9px] font-bold text-gray-400 mt-0.5">${item.variantName}</p>
                            <div class="flex justify-between items-center mt-1">
                                <span class="font-black text-sm">$${item.price.toFixed(2)}</span>
                                <span class="text-[10px] font-bold text-gray-400">Qty: ${item.qty}</span>
                            </div>
                        </div>
                        <button onclick="removeFromCart(${index})" class="text-gray-300 hover:text-red-500 transition-colors">
                            <i class="fa-solid fa-trash-can text-sm"></i>
                        </button>
                    </div>
                `;
            });

            tUSD.innerText = `$${total.toFixed(2)}`;
            tKHR.innerText = `៛${(total * KHR_RATE).toLocaleString()}`;
            badge.innerText = count;

            if (cart.length === 0) {
                cont.innerHTML = '<div class="h-full flex flex-col items-center justify-center text-gray-300 font-bold text-xs uppercase tracking-widest opacity-40">Your bag is empty</div>';
            }
        }

        function removeFromCart(idx) {
            cart.splice(idx, 1);
            updateCartUI();
        }

        window.onload = fetchProducts;
    </script>
</body>
</html>
