<!-- [I am adding the Checkout Form and API logic here] -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Somphea Reak | Toy Universe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Kantumruy+Pro:wght@400;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f9fafb; }
        .khmer { font-family: 'Kantumruy Pro', sans-serif; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .cat-pill.active { background: #000; color: #fff; }
    </style>
</head>
<body class="pb-20">

    <!-- [NAVBAR AND GRID ARE SAME AS PREVIOUS] -->
    <nav class="fixed top-0 w-full bg-white/90 backdrop-blur-xl z-50 border-b h-16 flex items-center px-4 justify-between">
        <div class="flex items-center gap-3">
            <a href="/" class="w-10 h-10 flex items-center justify-center rounded-full bg-gray-50"><i class="fa-solid fa-house text-sm"></i></a>
            <div class="flex items-center gap-2">
                <img src="/static/image/logo.png" alt="Logo" class="w-8 h-8 object-contain">
                <div class="flex flex-col leading-none">
                    <span class="khmer font-bold text-gray-900 text-sm">សម្ភារៈ</span>
                    <span class="text-[9px] font-black text-gray-400 tracking-tighter uppercase">Somphea Reak</span>
                </div>
            </div>
        </div>
        <button onclick="toggleCart()" class="relative w-10 h-10 flex items-center justify-center rounded-full bg-gray-50">
            <i class="fa-solid fa-cart-shopping"></i>
            <span id="cart-badge" class="absolute -top-1 -right-1 bg-red-500 text-white text-[9px] font-black w-4 h-4 rounded-full flex items-center justify-center">0</span>
        </button>
    </nav>

    <div class="mt-16 bg-white border-b sticky top-16 z-40 overflow-x-auto flex gap-2 p-4 hide-scrollbar" id="dynamic-filter-bar">
        <button onclick="filter('All')" class="cat-pill active whitespace-nowrap px-6 py-2 rounded-full border text-xs font-bold transition-all">All Inventory</button>
    </div>

    <main class="max-w-7xl mx-auto px-4 py-8"><div id="grid" class="grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-6"></div></main>

    <!-- CHECKOUT MODAL -->
    <div id="checkout-modal" class="fixed inset-0 z-[70] flex items-center justify-center p-4 hidden">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-md" onclick="toggleCheckout()"></div>
        <div class="bg-white w-full max-w-md rounded-[32px] overflow-hidden relative shadow-2xl p-6">
            <h2 class="text-2xl font-black mb-1">Shipping Details</h2>
            <p class="text-xs font-bold text-gray-400 mb-6 uppercase tracking-widest">Complete your order</p>
            
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-black text-gray-400 uppercase ml-1">Full Name</label>
                    <input type="text" id="cust-name" class="w-full bg-gray-50 border border-gray-100 rounded-xl p-3 font-bold text-sm outline-none focus:border-black" placeholder="John Doe">
                </div>
                <div>
                    <label class="text-[10px] font-black text-gray-400 uppercase ml-1">Phone Number</label>
                    <input type="text" id="cust-phone" class="w-full bg-gray-50 border border-gray-100 rounded-xl p-3 font-bold text-sm outline-none focus:border-black" placeholder="012 345 678">
                </div>
                <div>
                    <label class="text-[10px] font-black text-gray-400 uppercase ml-1">Delivery Address</label>
                    <textarea id="cust-address" rows="3" class="w-full bg-gray-50 border border-gray-100 rounded-xl p-3 font-bold text-sm outline-none focus:border-black" placeholder="Street, City..."></textarea>
                </div>
                <button onclick="processOrder()" id="confirm-btn" class="w-full bg-black text-white font-black py-4 rounded-2xl shadow-xl uppercase text-xs tracking-widest active:scale-95 transition-all">
                    Finish & Send Order
                </button>
            </div>
        </div>
    </div>

    <!-- SELECTION MODAL AND CART PANEL -->
    <div id="modal" class="fixed inset-0 z-[60] flex items-center justify-center p-4 hidden">
        <div class="absolute inset-0 bg-black/40 backdrop-blur-sm" onclick="closeModal()"></div>
        <div class="bg-white w-full max-w-md rounded-[32px] overflow-hidden relative shadow-2xl" id="modal-container">
            <button onclick="closeModal()" class="absolute top-4 right-4 w-9 h-9 bg-white/80 rounded-full flex items-center justify-center shadow-md z-10"><i class="fa-solid fa-xmark text-gray-800"></i></button>
            <div id="modal-content-area" class="max-h-[85vh] overflow-y-auto pb-6"></div>
        </div>
    </div>

    <div id="cart" class="fixed inset-y-0 right-0 w-full max-w-sm bg-white shadow-2xl z-50 translate-x-full transition-transform duration-500 border-l flex flex-col">
        <div class="p-6 border-b flex justify-between items-center bg-gray-50">
            <h2 class="font-black text-lg uppercase tracking-tight">Shopping Bag</h2>
            <button onclick="toggleCart()" class="text-gray-400"><i class="fa-solid fa-xmark text-xl"></i></button>
        </div>
        <div id="cart-items" class="flex-1 overflow-y-auto p-4 space-y-4"></div>
        <div class="p-6 border-t bg-gray-50 space-y-4">
            <div class="flex justify-between font-black">
                <span class="text-gray-400 text-[10px] uppercase">Subtotal</span>
                <div class="text-right leading-none">
                    <div id="total-usd" class="text-xl">$0.00</div>
                    <div id="total-khr" class="text-[10px] text-gray-500 font-bold">៛0</div>
                </div>
            </div>
            <button onclick="toggleCheckout()" class="w-full bg-black text-white font-black py-4 rounded-2xl shadow-lg uppercase text-xs tracking-widest active:scale-95">Checkout</button>
        </div>
    </div>

    <script>
        let products = []; let cart = []; const RATE = 4000;
        async function load() {
            const res = await fetch('/api/products/toy'); const data = await res.json();
            products = data.products; render();
        }

        function toggleCart() { document.getElementById('cart').classList.toggle('translate-x-full'); }
        function toggleCheckout() { 
            if(cart.length === 0) return alert("Your bag is empty!");
            document.getElementById('checkout-modal').classList.toggle('hidden'); 
        }

        async function processOrder() {
            const btn = document.getElementById('confirm-btn');
            const name = document.getElementById('cust-name').value;
            const phone = document.getElementById('cust-phone').value;
            const address = document.getElementById('cust-address').value;
            
            if(!name || !phone || !address) return alert("Please fill all details!");
            
            btn.innerText = "SENDING..."; btn.disabled = true;

            const total = cart.reduce((acc, item) => acc + (item.price * item.qty), 0);
            
            const res = await fetch('/api/checkout', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, phone, address, items: cart, total: total })
            });
            
            const result = await res.json();
            if(result.status === 'success') {
                alert("Order Sent Successfully! We will contact you soon.");
                cart = []; updateCart();
                toggleCheckout(); toggleCart();
                btn.innerText = "FINISH & SEND ORDER"; btn.disabled = false;
            } else {
                alert("Error sending order. Please try again.");
                btn.innerText = "FINISH & SEND ORDER"; btn.disabled = false;
            }
        }

        function updateCart() {
            const list = document.getElementById('cart-items');
            const usd = document.getElementById('total-usd');
            const khr = document.getElementById('total-khr');
            const badge = document.getElementById('cart-badge');
            list.innerHTML = ''; let t = 0; let c = 0;
            cart.forEach((i, idx) => {
                t += i.price * i.qty; c += i.qty;
                list.innerHTML += `<div class="flex gap-4 items-center bg-gray-50 p-3 rounded-2xl border border-gray-100"><img src="${i.image}" class="w-12 h-12 rounded-xl object-cover"><div class="flex-1"><h4 class="font-black text-xs">${i.title}</h4><p class="text-[9px] font-bold text-gray-400">${i.style} x ${i.qty}</p></div><button onclick="cart.splice(${idx},1);updateCart()" class="text-gray-300 hover:text-red-500"><i class="fa-solid fa-trash-can"></i></button></div>`;
            });
            usd.innerText = `$${t.toFixed(2)}`; khr.innerText = `៛${(t * RATE).toLocaleString()}`; badge.innerText = c;
        }

        // [Remaining openModal and updateModal functions as defined before...]
        function render() {
            const grid = document.getElementById('grid'); grid.innerHTML = '';
            products.forEach(p => {
                grid.innerHTML += `<div class="bg-white rounded-[24px] border border-gray-100 overflow-hidden group shadow-sm hover:shadow-md cursor-pointer" onclick='openModal(${JSON.stringify(p)})'><div class="aspect-square relative overflow-hidden"><img src="${p.thumbnail}" class="w-full h-full object-cover group-hover:scale-105 transition-all"></div><div class="p-4"><span class="text-[8px] font-black text-[#ff5000] uppercase">${p.category}</span><h3 class="font-bold text-sm text-gray-800 truncate mt-0.5">${p.title}</h3><div class="mt-3 flex justify-between items-end border-t pt-3"><div class="flex flex-col"><span class="font-black text-base">$${p.price.toFixed(2)}</span><span class="text-[9px] font-bold text-gray-400">៛${(p.price * RATE).toLocaleString()}</span></div><div class="w-7 h-7 bg-gray-50 rounded-full flex items-center justify-center text-[10px]"><i class="fa-solid fa-plus"></i></div></div></div></div>`;
            });
        }
        
        let currentP = null, variantIdx = 0, qty = 1;
        function openModal(p) { currentP = p; variantIdx = 0; qty = 1; document.getElementById('modal').classList.remove('hidden'); updateModalUI(); }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); }
        function updateModalUI() {
            const v = currentP.variants[variantIdx];
            document.getElementById('modal-content-area').innerHTML = `<img src="${v.image}" class="w-full aspect-square object-cover"><div class="p-6"><h2 class="text-xl font-black">${currentP.title}</h2><p class="text-2xl font-black text-black">$${v.price.toFixed(2)}</p><div class="mt-6"><p class="text-[10px] font-black uppercase text-gray-400">Styles</p><div class="flex gap-2 mt-2">${currentP.variants.map((v, i) => `<button onclick="variantIdx=${i};updateModalUI()" class="w-12 h-12 rounded-xl border-2 overflow-hidden ${variantIdx===i?'border-black':'border-gray-100 opacity-40'}"><img src="${v.image}" class="w-full h-full object-cover"></button>`).join('')}</div></div><div class="mt-8 flex gap-4"><div class="flex items-center gap-4 bg-gray-100 rounded-xl px-4 py-2"><button onclick="qty=Math.max(1,qty-1);updateModalUI()">-</button><span>${qty}</span><button onclick="qty++;updateModalUI()">+</button></div><button onclick="addToBag()" class="flex-1 bg-black text-white font-black py-4 rounded-xl uppercase text-xs">Add to Bag</button></div></div>`;
        }
        function addToBag() { const v = currentP.variants[variantIdx]; const id = `${currentP.id}-${variantIdx}`; const ex = cart.find(i => i.cartId === id); if(ex) ex.qty += qty; else cart.push({cartId:id, title:currentP.title, style:v.name, price:v.price, image:v.image, qty}); closeModal(); updateCart(); }

        window.onload = load;
    </script>
</body>
</html>
