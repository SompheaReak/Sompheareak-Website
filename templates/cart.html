<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Somphea Reak | My Bag</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Khmer:wght@400;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', 'Noto Sans Khmer', sans-serif; background-color: #f2f2f2; -webkit-tap-highlight-color: transparent; user-select: none; }
        .glass-nav { background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(10px); border-top: 1px solid rgba(0,0,0,0.05); }
        .shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }
        .screenshot-frame { font-family: 'Noto Sans Khmer', sans-serif; background: #fff; width: 400px; padding: 30px; box-sizing: border-box; border-radius: 0; position: fixed; left: -9999px; top: 0; }
    </style>
</head>
<body class="pb-32">

    <!-- HEADER (Return to Home) -->
    <header class="sticky top-0 z-50 glass-nav px-4 py-3 flex items-center justify-between shadow-sm h-[72px]">
        <a href="index.html" class="w-10 h-10 rounded-full bg-gray-100 text-gray-700 flex items-center justify-center active:scale-90 transition-transform shadow-sm border border-gray-200">
            <i class="fa-solid fa-house"></i>
        </a>
        <h1 class="font-black text-xl tracking-tighter text-gray-900 leading-none">MY BAG</h1>
        <div class="w-10 h-10"></div> <!-- Spacer to keep title centered -->
    </header>

    <main class="p-4" id="main-content">
        <!-- ORDER SUMMARY -->
        <div class="mb-6">
            <h2 class="text-xs font-black text-gray-400 uppercase tracking-widest mb-3 pl-1">Order Summary</h2>
            <div id="checkout-items" class="space-y-3"></div>
        </div>

        <!-- DELIVERY FORM -->
        <div id="delivery-form" class="bg-white p-5 rounded-2xl border border-gray-100 shadow-sm space-y-4 mb-4 hidden">
            <h3 class="text-sm font-black text-gray-800 flex items-center gap-2">
                <i class="fa-solid fa-truck-fast text-orange-500"></i> Delivery Details
            </h3>
            <div class="bg-gray-50 rounded-xl px-4 py-3 border border-gray-200 focus-within:border-black transition-all" id="field-name">
                <input type="text" id="cust-name" class="w-full bg-transparent border-none p-0 text-sm font-bold text-gray-800 focus:ring-0 placeholder-gray-400" placeholder="Full Name *">
            </div>
            <div class="bg-gray-50 rounded-xl px-4 py-3 border border-gray-200 focus-within:border-black transition-all" id="field-phone">
                <input type="tel" id="cust-phone" class="w-full bg-transparent border-none p-0 text-sm font-bold text-gray-800 focus:ring-0 placeholder-gray-400" placeholder="Phone Number *">
            </div>
            <div class="bg-gray-50 rounded-xl px-4 py-3 border border-gray-200 focus-within:border-black transition-all">
                <textarea id="cust-address" class="w-full bg-transparent border-none p-0 text-sm font-bold text-gray-800 focus:ring-0 h-16 resize-none placeholder-gray-400" placeholder="Delivery Address / Location..."></textarea>
            </div>
        </div>
    </main>

    <!-- INVOICE SUCCESS SCREEN (Hidden until generated) -->
    <section class="p-4 hidden flex-col items-center" id="result-section">
        <div class="w-16 h-16 bg-green-100 text-green-500 rounded-full flex items-center justify-center text-3xl mb-3 shadow-sm">
            <i class="fa-solid fa-check"></i>
        </div>
        <h2 class="font-black text-xl text-gray-900 mb-1">Invoice Ready!</h2>
        <p class="text-xs text-gray-500 mb-6 font-bold">Please review your invoice below.</p>
        
        <div class="w-full border rounded-2xl overflow-hidden shadow-xl mb-4">
            <img id="generated-invoice-img" src="" class="w-full h-auto">
        </div>
    </section>

    <!-- BOTTOM ACTION BAR -->
    <div class="fixed bottom-0 left-0 right-0 glass-nav px-5 py-4 z-40 pb-safe shadow-[0_-10px_30px_rgba(0,0,0,0.05)]" id="bottom-bar">
        <div class="flex justify-between items-end mb-3">
            <span class="text-xs font-bold text-gray-500 uppercase tracking-widest">Total Amount</span>
            <div class="text-right">
                <div class="text-2xl font-black text-orange-500 leading-none mb-1" id="cart-total-riel">0៛</div>
                <div class="text-xs text-gray-500 font-bold" id="cart-total-usd">$0.00</div>
            </div>
        </div>
        <button onclick="processCheckout()" id="action-btn" class="w-full bg-black text-white font-bold py-4 rounded-xl shadow-xl active:scale-95 transition-transform flex items-center justify-center gap-2">
            <span>Continue to Delivery</span>
            <i class="fa-solid fa-arrow-right"></i>
        </button>
    </div>

    <!-- LOADING SPINNER -->
    <div id="loadingOverlay" class="fixed inset-0 z-[110] bg-black/60 hidden items-center justify-center backdrop-blur-sm">
        <div class="bg-white p-6 rounded-3xl shadow-2xl flex flex-col items-center gap-4">
            <i class="fa-solid fa-spinner fa-spin text-4xl text-black"></i>
            <span class="text-xs font-bold text-gray-500 uppercase tracking-widest">Generating Invoice...</span>
        </div>
    </div>

    <script>
        const EXCHANGE_RATE = 4000;
        const TELEGRAM_USERNAME = "Somphea_Reak"; 
        let cart = [];
        let currentState = 'cart'; // 'cart' -> 'delivery' -> 'invoice'

        function formatCurrency(usd) {
            return { riel: `${Math.round(usd * EXCHANGE_RATE).toLocaleString()}៛`, usd: `$${usd.toFixed(2)}` };
        }

        function init() {
            const savedCart = localStorage.getItem('somphea_global_cart');
            if(savedCart) { try { cart = JSON.parse(savedCart); } catch(e) { cart = []; } }
            renderCart();
        }

        function saveCart() {
            localStorage.setItem('somphea_global_cart', JSON.stringify(cart));
            renderCart();
        }

        function updateQty(idx, delta) {
            cart[idx].qty += delta;
            if (cart[idx].qty <= 0) cart[idx].qty = 1;
            saveCart();
        }

        function removeItem(idx) {
            cart.splice(idx, 1);
            saveCart();
        }

        function renderCart() {
            if(cart.length === 0) {
                document.getElementById('main-content').innerHTML = `
                    <div class="flex flex-col items-center justify-center py-20 text-center">
                        <div class="w-24 h-24 bg-gray-100 rounded-full flex items-center justify-center mb-4"><i class="fa-solid fa-basket-shopping text-4xl text-gray-300"></i></div>
                        <h2 class="text-xl font-black text-gray-800 mb-2">Your Bag is Empty</h2>
                        <p class="text-sm font-bold text-gray-400 mb-8">Go back to the studio and add some products.</p>
                        <div class="flex gap-3">
                            <a href="toy.html" class="px-6 py-3 bg-gray-900 text-white text-sm font-bold rounded-full shadow-md"><i class="fa-solid fa-robot mr-2"></i>Toys</a>
                            <a href="bracelet.html" class="px-6 py-3 bg-[#90D730] text-white text-sm font-bold rounded-full shadow-md"><i class="fa-regular fa-gem mr-2"></i>Jewelry</a>
                        </div>
                    </div>`;
                document.getElementById('bottom-bar').classList.add('hidden');
                return;
            }

            document.getElementById('bottom-bar').classList.remove('hidden');

            document.getElementById('checkout-items').innerHTML = cart.map((item, idx) => {
                const total = formatCurrency(item.price * item.qty);
                if (currentState === 'cart') {
                    // Editable view
                    return `
                    <div class="flex gap-3 bg-white p-3 rounded-2xl border border-gray-100 shadow-sm items-center">
                        <img src="${item.image}" class="w-20 h-20 rounded-xl object-cover flex-shrink-0 border border-gray-50">
                        <div class="flex-1 min-w-0">
                            <div class="text-sm font-bold text-gray-800 line-clamp-1 mb-1">${item.title}</div>
                            <div class="text-[10px] text-gray-500 bg-gray-50 inline-block px-2 py-0.5 rounded font-bold border border-gray-100">${item.variantName}</div>
                            <div class="flex justify-between items-end mt-2">
                                <div class="font-black text-gray-900 text-sm">${total.riel}</div>
                                <div class="flex items-center bg-gray-100 rounded-lg p-0.5">
                                    <button onclick="updateQty(${idx}, -1)" class="w-7 h-7 bg-white rounded shadow-sm text-gray-600 font-bold active:scale-90">-</button>
                                    <span class="w-8 text-center font-bold text-xs">${item.qty}</span>
                                    <button onclick="updateQty(${idx}, 1)" class="w-7 h-7 bg-white rounded shadow-sm text-gray-600 font-bold active:scale-90">+</button>
                                </div>
                            </div>
                        </div>
                        <button onclick="removeItem(${idx})" class="w-8 h-8 flex items-center justify-center text-gray-400 hover:text-red-500 bg-gray-50 rounded-full active:scale-90"><i class="fa-solid fa-trash-can text-xs"></i></button>
                    </div>`;
                } else {
                    // Static summary view for delivery step
                    return `
                    <div class="flex gap-4 bg-white p-3 rounded-2xl border border-gray-100 shadow-sm items-center">
                        <img src="${item.image}" class="w-12 h-12 rounded-lg object-cover flex-shrink-0 border border-gray-50">
                        <div class="flex-1 min-w-0">
                            <div class="text-xs font-bold text-gray-800 line-clamp-1">${item.title}</div>
                            <div class="text-[10px] text-gray-400 font-bold">${item.variantName}</div>
                        </div>
                        <div class="text-right">
                            <div class="text-[10px] text-gray-400 font-bold mb-0.5">Qty: ${item.qty}</div>
                            <div class="text-xs font-black text-gray-900">${total.riel}</div>
                        </div>
                    </div>`;
                }
            }).join('');

            // Totals
            const totalUsd = cart.reduce((acc, item) => acc + (item.price * item.qty), 0);
            const totals = formatCurrency(totalUsd);
            document.getElementById('cart-total-riel').innerText = totals.riel;
            document.getElementById('cart-total-usd').innerText = totals.usd;
        }

        function processCheckout() {
            if (currentState === 'cart') {
                currentState = 'delivery';
                renderCart(); // changes to static summary
                document.getElementById('delivery-form').classList.remove('hidden');
                
                const btn = document.getElementById('action-btn');
                btn.innerHTML = `<i class="fa-solid fa-wand-magic-sparkles"></i> <span>Generate Official Invoice</span>`;
                window.scrollTo({top: 0, behavior: 'smooth'});
            } else if (currentState === 'delivery') {
                generateInvoice();
            }
        }

        async function generateInvoice() {
            const name = document.getElementById('cust-name').value.trim();
            const phone = document.getElementById('cust-phone').value.trim();
            const address = document.getElementById('cust-address').value.trim();
            
            let isValid = true;
            if(!name) { document.getElementById('field-name').classList.add('border-red-500', 'shake'); isValid = false; } 
            else { document.getElementById('field-name').classList.remove('border-red-500', 'shake'); }
            
            if(!phone) { document.getElementById('field-phone').classList.add('border-red-500', 'shake'); isValid = false; } 
            else { document.getElementById('field-phone').classList.remove('border-red-500', 'shake'); }

            if(!isValid) { setTimeout(() => document.querySelectorAll('.shake').forEach(el => el.classList.remove('shake')), 500); return; }

            document.getElementById('loadingOverlay').classList.remove('hidden');
            document.getElementById('loadingOverlay').classList.add('flex');

            const totalUsd = cart.reduce((acc, item) => acc + (item.price * item.qty), 0);
            const totalPrice = formatCurrency(totalUsd);

            const tempDiv = document.createElement('div');
            tempDiv.className = 'screenshot-frame'; 
            
            let html = `
                <div style="text-align: center; margin-bottom: 20px;">
                    <h1 style="color: #111827; font-weight: 900; font-size: 26px; margin-bottom: 4px; letter-spacing: -1px; text-transform: uppercase;">Somphea Reak</h1>
                    <p style="color: #9ca3af; font-size: 10px; text-transform: uppercase; letter-spacing: 2px; font-weight: 700;">Official Order Invoice</p>
                </div>
                
                <div style="background: #f9fafb; border-radius: 12px; padding: 15px; margin-bottom: 20px; border: 1px solid #f3f4f6;">
                    <div style="display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 6px;"><span style="color: #6b7280; font-weight: 600;">Date</span><span style="font-weight: 800; color: #111827;">${new Date().toLocaleDateString()}</span></div>
                    <div style="display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 6px;"><span style="color: #6b7280; font-weight: 600;">Customer</span><span style="font-weight: 800; color: #111827;">${name}</span></div>
                    <div style="display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 6px;"><span style="color: #6b7280; font-weight: 600;">Phone</span><span style="font-weight: 800; color: #111827;">${phone}</span></div>
                    ${address ? `<div style="font-size: 10px; color: #6b7280; margin-top: 8px; border-top: 1px dashed #e5e7eb; padding-top: 8px; font-weight: 600;">${address}</div>` : ''}
                </div>

                <div style="margin-bottom: 20px;">
                    <table style="width: 100%; font-size: 11px; border-collapse: collapse;">
                        <thead>
                            <tr style="border-bottom: 1px solid #e5e7eb;">
                                <th style="text-align: left; padding-bottom: 8px; color: #9ca3af; font-weight: 800; text-transform: uppercase; font-size: 9px;">Item</th>
                                <th style="text-align: center; padding-bottom: 8px; color: #9ca3af; font-weight: 800; text-transform: uppercase; font-size: 9px;">Qty</th>
                                <th style="text-align: right; padding-bottom: 8px; color: #9ca3af; font-weight: 800; text-transform: uppercase; font-size: 9px;">Price</th>
                            </tr>
                        </thead>
                        <tbody>
            `;

            cart.forEach(item => {
                html += `
                    <tr style="border-bottom: 1px solid #f9fafb;">
                        <td style="padding: 10px 0; display: flex; align-items: center; gap: 8px;">
                            <img src="${item.image}" style="width: 36px; height: 36px; border-radius: 6px; object-fit: cover; flex-shrink: 0; border: 1px solid #e5e7eb;">
                            <div>
                                <div style="font-weight: 800; color: #111827; max-width: 130px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${item.title}</div>
                                <div style="font-size: 9px; color: #6b7280; font-weight: 600;">${item.variantName}</div>
                            </div>
                        </td>
                        <td style="text-align: center; vertical-align: middle; color: #4b5563; font-weight: 700;">${item.qty}</td>
                        <td style="text-align: right; vertical-align: middle; font-weight: 800; color: #111827;">$${(item.price * item.qty).toFixed(2)}</td>
                    </tr>
                `;
            });

            html += `
                        </tbody>
                    </table>
                </div>

                <div style="border-top: 2px dashed #e5e7eb; padding-top: 15px;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px;"><span style="font-weight: 800; color: #6b7280; font-size: 11px; text-transform: uppercase;">Total USD</span><span style="font-weight: 900; color: #111827; font-size: 16px;">${totalPrice.usd}</span></div>
                    <div style="display: flex; justify-content: space-between; align-items: center;"><span style="font-weight: 800; color: #6b7280; font-size: 11px; text-transform: uppercase;">Total Riel</span><span style="font-weight: 900; color: #ff5000; font-size: 20px;">${totalPrice.riel}</span></div>
                </div>
            `;
            
            tempDiv.innerHTML = html; document.body.appendChild(tempDiv);

            await Promise.all(Array.from(tempDiv.querySelectorAll('img')).map(img => { img.crossOrigin = "anonymous"; if(img.complete) return Promise.resolve(); return new Promise(r => { img.onload = img.onerror = r; }); }));

            try {
                const canvas = await html2canvas(tempDiv, { useCORS: true, scale: 3, backgroundColor: "#ffffff" });
                document.getElementById('generated-invoice-img').src = canvas.toDataURL("image/png");
                
                document.getElementById('main-content').classList.add('hidden');
                document.getElementById('result-section').classList.remove('hidden');
                document.getElementById('result-section').classList.add('flex');
                
                const btn = document.getElementById('action-btn');
                btn.innerHTML = `<i class="fa-brands fa-telegram text-xl"></i><span>Send to Telegram</span>`;
                btn.className = "w-full bg-[#0088cc] text-white font-bold py-4 rounded-xl shadow-xl active:scale-95 transition-transform flex items-center justify-center gap-2";
                btn.onclick = () => openTelegramWithText(name, phone, address);
                window.scrollTo({top: 0, behavior: 'smooth'});
            } catch(err) {
                alert("Generation failed. Please try again.");
            } finally {
                document.body.removeChild(tempDiv);
                document.getElementById('loadingOverlay').classList.remove('flex');
                document.getElementById('loadingOverlay').classList.add('hidden');
            }
        }

        function openTelegramWithText(name, phone, address) {
            let msg = `🧾 *NEW ORDER INVOICE*\n👤 ${name}\n📞 ${phone}\n`;
            if(address) msg += `📍 ${address}\n`;
            msg += `\n*I have generated the invoice image. Sending it next!*`;
            localStorage.removeItem('somphea_global_cart'); // Clear cart after sending!
            window.open(`https://t.me/${TELEGRAM_USERNAME}?text=${encodeURIComponent(msg)}`, '_blank');
            setTimeout(() => window.location.href = 'index.html', 1000); // Redirect home
        }

        init();
    </script>
</body>
</html>
