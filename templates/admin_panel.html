<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Admin | Somphea Reak</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        #drop-zone.drag-active { border-color: #f97316; background-color: #fff7ed; }
    </style>
</head>
<body class="pb-20">

    <header class="bg-white border-b px-6 py-4 flex justify-between items-center sticky top-0 z-50 shadow-sm">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-black rounded-lg flex items-center justify-center text-white font-black">S</div>
            <h1 class="font-black text-gray-900">Inventory Pro</h1>
        </div>
        <a href="/admin/logout" class="text-red-500 font-bold text-sm">Logout</a>
    </header>

    <main class="p-4 md:p-6 max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-6">
        
        <!-- UPLOAD SECTION -->
        <section class="lg:col-span-1 bg-white p-6 rounded-3xl shadow-sm border h-fit">
            <h2 class="font-black text-lg mb-5"><i class="fa-solid fa-plus mr-2 text-orange-500"></i>Add Product</h2>
            
            <form action="/admin/product/add" method="POST" enctype="multipart/form-data" class="space-y-4">
                
                <div id="drop-zone" class="border-2 border-dashed border-gray-200 rounded-2xl p-4 text-center cursor-pointer bg-gray-50 h-40 flex flex-col items-center justify-center relative overflow-hidden">
                    <input type="file" name="images" id="file-input" accept="image/*" multiple required class="hidden">
                    <div id="upload-prompt" class="pointer-events-none">
                        <i class="fa-solid fa-cloud-arrow-up text-2xl text-gray-400 mb-2"></i>
                        <p class="text-xs font-bold text-gray-500">Tap to Upload up to 10 Images</p>
                    </div>
                    <div id="preview-grid" class="grid grid-cols-3 gap-2 w-full hidden"></div>
                </div>

                <input type="text" name="title" required placeholder="Product Title" class="w-full border rounded-xl px-4 py-3 text-sm font-bold focus:border-orange-500 outline-none">
                
                <div class="grid grid-cols-2 gap-3">
                    <input type="number" step="0.01" name="price" required placeholder="Price ($)" class="w-full border rounded-xl px-4 py-3 text-sm font-bold focus:border-orange-500 outline-none">
                    <input type="number" name="stock" required placeholder="Stock Qty" class="w-full border rounded-xl px-4 py-3 text-sm font-bold focus:border-orange-500 outline-none">
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <select name="store" id="store-select" class="w-full border rounded-xl px-4 py-3 text-sm font-bold bg-white outline-none">
                        <option value="toy">Toy Store</option>
                        <option value="bracelet">Bracelet Store</option>
                    </select>
                    <select name="category" id="category-select" class="w-full border rounded-xl px-4 py-3 text-sm font-bold bg-white outline-none">
                        <!-- Filled by JS -->
                    </select>
                </div>

                <button type="submit" class="w-full bg-black text-white font-bold rounded-xl py-4 shadow-lg active:scale-95 transition-all">Save to Database</button>
            </form>
        </section>

        <!-- LIST SECTION -->
        <section class="lg:col-span-2 bg-white rounded-3xl shadow-sm border overflow-hidden">
            <div class="p-5 border-b bg-gray-50 font-black flex justify-between">
                <span>Current Inventory</span>
                <span class="text-orange-500">{{ products|length }} Items</span>
            </div>
            <div class="divide-y">
                {% for p in products %}
                <div class="p-4 flex items-center gap-4">
                    <img src="{{ p.image }}" class="w-14 h-14 rounded-lg object-cover border">
                    <div class="flex-1">
                        <p class="font-bold text-sm text-gray-800">{{ p.title }}</p>
                        <p class="text-[10px] text-gray-400 font-bold uppercase tracking-tight">{{ p.store }} • {{ p.category }}</p>
                    </div>
                    <div class="text-right">
                        <p class="font-black text-sm">${{ "%.2f"|format(p.price) }}</p>
                        <form action="/admin/product/delete/{{ p.id }}" method="POST">
                            <button type="submit" class="text-red-400 text-xs font-bold hover:text-red-600">Delete</button>
                        </form>
                    </div>
                </div>
                {% endfor %}
            </div>
        </section>
    </main>

    <script>
        const store = document.getElementById('store-select');
        const cat = document.getElementById('category-select');
        const cats = {
            toy: ['Soldier', 'Action Figure', 'LEGO', 'Vehicle', 'Other'],
            bracelet: ['Jade', 'Silver 925', 'Gold', 'Beaded', 'Other']
        };

        function update() {
            cat.innerHTML = cats[store.value].map(c => `<option value="${c}">${c}</option>`).join('');
        }
        store.onchange = update;
        update();

        const input = document.getElementById('file-input');
        const zone = document.getElementById('drop-zone');
        const grid = document.getElementById('preview-grid');
        const prompt = document.getElementById('upload-prompt');

        zone.onclick = () => input.click();
        input.onchange = (e) => {
            const files = e.target.files;
            if(files.length > 0) {
                prompt.classList.add('hidden');
                grid.classList.remove('hidden');
                grid.innerHTML = '';
                [...files].slice(0, 10).forEach(f => {
                    const reader = new FileReader();
                    reader.onload = (re) => {
                        const img = document.createElement('img');
                        img.src = re.target.result;
                        img.className = "w-full aspect-square object-cover rounded-md border";
                        grid.appendChild(img);
                    }
                    reader.readAsDataURL(f);
                });
            }
        };
    </script>
</body>
</html>
