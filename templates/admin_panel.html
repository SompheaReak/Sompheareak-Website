<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Somphea Reak | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f4f7f6; }
        .input-box { border: 1px solid #e2e8f0; border-radius: 10px; padding: 12px; width: 100%; font-weight: 600; }
        .input-box:focus { border-color: #ff5000; outline: none; }
        .filter-pill.active { background: #ff5000; color: white; border-color: #ff5000; }
    </style>
</head>
<body class="pb-20">

    <header class="bg-white border-b px-6 py-4 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <a href="/" class="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center text-gray-800 hover:bg-black hover:text-white transition-all">
                <i class="fa-solid fa-house"></i>
            </a>
            <h1 class="font-extrabold text-gray-800 tracking-tight">STUDIO MANAGER</h1>
        </div>
        <a href="/admin/logout" class="text-gray-400 hover:text-red-500"><i class="fa-solid fa-power-off text-xl"></i></a>
    </header>

    <main class="max-w-7xl mx-auto p-4 md:p-6 grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <!-- ADD PRODUCT FORM -->
        <section class="lg:col-span-4">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 sticky top-24">
                <h2 class="font-black text-lg mb-6"><i class="fa-solid fa-plus-circle text-[#ff5000] mr-2"></i>New Item</h2>
                <form action="/admin/product/add" method="POST" enctype="multipart/form-data" class="space-y-4">
                    
                    <div onclick="document.getElementById('file-input').click()" class="border-2 border-dashed border-gray-200 rounded-2xl p-4 text-center bg-gray-50 cursor-pointer hover:border-[#ff5000]">
                        <input type="file" name="images" id="file-input" accept="image/*" multiple required class="hidden">
                        <i class="fa-solid fa-images text-2xl text-gray-300"></i>
                        <p class="text-[10px] font-bold text-gray-400 mt-2 uppercase">Tap to select 1-10 photos</p>
                        <div id="preview" class="grid grid-cols-4 gap-2 mt-3 hidden"></div>
                    </div>

                    <input type="text" name="title" required placeholder="Product Title" class="input-box">
                    
                    <div class="grid grid-cols-2 gap-3">
                        <input type="number" step="0.01" name="price" id="p-usd" required placeholder="Price ($)" class="input-box">
                        <div class="input-box bg-gray-50 text-gray-400 flex justify-between"><span>៛</span><span id="p-khr">0</span></div>
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <select name="store" class="input-box bg-white">
                            <option value="toy">Toy Store</option>
                            <option value="bracelet">Bracelet Store</option>
                        </select>
                        <input type="number" name="stock" required placeholder="Stock" class="input-box">
                    </div>

                    <input list="cat-list" name="category" required placeholder="Category (e.g. Ninjago)" class="input-box">
                    <datalist id="cat-list">{% for c in categories %}<option value="{{c}}">{% endfor %}</datalist>

                    <button type="submit" class="w-full bg-[#ff5000] text-white font-black py-4 rounded-xl shadow-lg active:scale-95 transition-all">PUBLISH</button>
                </form>
            </div>
        </section>

        <!-- INVENTORY LIST -->
        <section class="lg:col-span-8 space-y-4">
            <div class="bg-white p-4 rounded-2xl border flex gap-2 overflow-x-auto">
                <button onclick="filterInv('All')" class="filter-pill active px-4 py-2 rounded-full border border-gray-200 text-xs font-bold">All</button>
                {% for c in categories %}<button onclick="filterInv('{{c}}')" class="filter-pill px-4 py-2 rounded-full border border-gray-200 text-xs font-bold">{{c}}</button>{% endfor %}
            </div>

            <div class="bg-white rounded-2xl border overflow-hidden">
                <div class="divide-y" id="inv-list">
                    {% for p in products %}
                    <div class="p-4 flex items-center gap-4 inv-row" data-cat="{{p.category}}">
                        <img src="{{p.image}}" class="w-16 h-16 rounded-xl object-cover border">
                        <div class="flex-1">
                            <span class="text-[8px] font-black text-[#ff5000] bg-orange-50 px-2 py-1 rounded-full uppercase">${{p.category}}</span>
                            <h4 class="font-bold text-sm text-gray-800 mt-1">{{p.title}}</h4>
                            <p class="text-xs font-bold text-gray-400 mt-1">$ {{ "%.2f"|format(p.price) }} • Stock: {{p.stock}}</p>
                        </div>
                        <form action="/admin/product/delete/{{p.id}}" method="POST">
                            <button class="w-10 h-10 border rounded-xl text-gray-300 hover:text-red-500"><i class="fa-solid fa-trash-can"></i></button>
                        </form>
                    </div>
                    {% endfor %}
                </div>
            </div>
        </section>
    </main>

    <script>
        document.getElementById('p-usd').oninput = (e) => document.getElementById('p-khr').innerText = (e.target.value * 4000).toLocaleString();
        
        document.getElementById('file-input').onchange = (e) => {
            const grid = document.getElementById('preview');
            grid.innerHTML = ''; grid.classList.remove('hidden');
            [...e.target.files].slice(0,10).forEach(f => {
                const r = new FileReader();
                r.onload = (re) => grid.innerHTML += `<img src="${re.target.result}" class="w-full aspect-square object-cover rounded-lg border">`;
                r.readAsDataURL(f);
            });
        };

        function filterInv(c) {
            document.querySelectorAll('.filter-pill').forEach(b => b.classList.toggle('active', b.innerText === c || (c==='All' && b.innerText==='All')));
            document.querySelectorAll('.inv-row').forEach(r => r.style.display = (c==='All' || r.dataset.cat === c) ? 'flex' : 'none');
        }
    </script>
</body>
</html>
