<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taobao Manager | Somphea Reak</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f3f4f6; }
        .input-box { border: 1px solid #e5e7eb; border-radius: 12px; padding: 12px; width: 100%; font-size: 14px; font-weight: 600; outline: none; transition: 0.2s; }
        .input-box:focus { border-color: #ff5000; ring: 2px; ring-color: #ff5000; }
        .btn-orange { background: linear-gradient(90deg, #ff9000 0%, #ff5000 100%); color: white; font-weight: 800; border-radius: 12px; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-20">

    <header class="bg-white border-b px-6 py-4 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <a href="/" class="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center text-gray-800 hover:bg-black hover:text-white transition-all">
                <i class="fa-solid fa-house"></i>
            </a>
            <h1 class="font-extrabold text-gray-800 tracking-tight">PRO MANAGER</h1>
        </div>
        <a href="/admin/logout" class="text-gray-400 hover:text-red-500"><i class="fa-solid fa-power-off text-xl"></i></a>
    </header>

    <main class="max-w-7xl mx-auto p-4 md:p-6 grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <!-- ADD PRODUCT FORM -->
        <section class="lg:col-span-5">
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100 sticky top-24">
                <h2 class="font-black text-lg mb-6 flex items-center gap-2">
                    <i class="fa-solid fa-circle-plus text-[#ff5000]"></i> New Taobao Item
                </h2>
                
                <form action="/admin/product/add" method="POST" enctype="multipart/form-data" class="space-y-4">
                    
                    <!-- MULTI-IMAGE SELECT -->
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-gray-400 uppercase">1. Upload Styles (Max 10)</label>
                        <div onclick="document.getElementById('file-input').click()" class="border-2 border-dashed border-gray-200 rounded-2xl p-6 text-center bg-gray-50 cursor-pointer hover:border-[#ff5000] transition-all">
                            <input type="file" name="images" id="file-input" accept="image/*" multiple required class="hidden">
                            <i class="fa-solid fa-images text-3xl text-gray-300"></i>
                            <p class="text-[11px] font-bold text-gray-500 mt-2">Tap to select all options/styles</p>
                        </div>
                    </div>

                    <!-- DYNAMIC VARIANT CONFIGURATOR (TAOBAO STYLE) -->
                    <div id="variant-config" class="hidden space-y-3 bg-orange-50/50 p-4 rounded-2xl border border-orange-100">
                        <label class="text-[10px] font-black text-[#ff5000] uppercase">2. Configure Prices per Style</label>
                        <div id="variant-list" class="space-y-3">
                            <!-- JS will inject rows here -->
                        </div>
                    </div>

                    <div class="space-y-1">
                        <label class="text-[10px] font-black text-gray-400 uppercase">Product Title</label>
                        <input type="text" name="title" required placeholder="Main Name (e.g. One Piece Figure)" class="input-box">
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <div class="space-y-1">
                            <label class="text-[10px] font-black text-gray-400 uppercase">Store</label>
                            <select name="store" class="input-box bg-white">
                                <option value="toy">Toy Store</option>
                                <option value="bracelet">Bracelet Store</option>
                            </select>
                        </div>
                        <div class="space-y-1">
                            <label class="text-[10px] font-black text-gray-400 uppercase">Total Stock</label>
                            <input type="number" name="stock" value="10" required class="input-box">
                        </div>
                    </div>

                    <div class="space-y-1">
                        <label class="text-[10px] font-black text-gray-400 uppercase">Custom Category</label>
                        <input list="cat-list" name="category" required placeholder="Type (e.g. Ninjago)" class="input-box">
                        <datalist id="cat-list">
                            {% for c in categories %}<option value="{{c}}">{% endfor %}
                        </datalist>
                    </div>

                    <button type="submit" class="w-full btn-orange py-4 mt-2 shadow-lg shadow-orange-100 uppercase tracking-widest text-sm">
                        Confirm & Upload
                    </button>
                </form>
            </div>
        </section>

        <!-- INVENTORY LIST -->
        <section class="lg:col-span-7">
            <div class="bg-white rounded-3xl border border-gray-100 overflow-hidden shadow-sm">
                <div class="p-5 border-b bg-gray-50 flex justify-between items-center">
                    <h3 class="font-black text-gray-800 text-sm">Live Inventory ({{ products|length }})</h3>
                    <div class="flex gap-1">
                        <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                    </div>
                </div>
                <div class="divide-y">
                    {% for p in products %}
                    <div class="p-4 flex items-center gap-4 hover:bg-gray-50 transition-all">
                        <img src="{{ p.image }}" class="w-16 h-16 rounded-xl object-cover border bg-white shadow-sm">
                        <div class="flex-1">
                            <div class="flex gap-2 mb-1">
                                <span class="text-[8px] font-black bg-gray-800 text-white px-2 py-0.5 rounded-full uppercase">{{ p.store }}</span>
                                <span class="text-[8px] font-black bg-orange-100 text-[#ff5000] px-2 py-0.5 rounded-full uppercase">{{ p.category }}</span>
                            </div>
                            <h4 class="font-bold text-gray-900 text-sm">{{ p.title }}</h4>
                            <p class="text-[10px] font-bold text-gray-400">Stock: {{ p.stock }} • Base: ${{ "%.2f"|format(p.price) }}</p>
                        </div>
                        <form action="/admin/product/delete/{{ p.id }}" method="POST">
                            <button class="w-10 h-10 rounded-full border border-gray-100 flex items-center justify-center text-gray-300 hover:text-red-500 hover:bg-red-50 transition-all">
                                <i class="fa-solid fa-trash-can text-sm"></i>
                            </button>
                        </form>
                    </div>
                    {% endfor %}
                </div>
            </div>
        </section>
    </main>

    <script>
        const fileInput = document.getElementById('file-input');
        const configArea = document.getElementById('variant-config');
        const variantList = document.getElementById('variant-list');

        fileInput.addEventListener('change', function() {
            const files = Array.from(this.files).slice(0, 10);
            if(files.length > 0) {
                configArea.classList.remove('hidden');
                variantList.innerHTML = '';
                
                files.forEach((file, index) => {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const row = document.createElement('div');
                        row.className = "flex gap-3 items-center bg-white p-3 rounded-xl border border-orange-100 shadow-sm";
                        row.innerHTML = `
                            <img src="${e.target.result}" class="w-12 h-12 rounded-lg object-cover border">
                            <div class="flex-1 space-y-2">
                                <input type="text" name="variant_names[]" required placeholder="Option Name (e.g. Red Version)" class="w-full text-[10px] font-bold border-b border-gray-100 outline-none focus:border-orange-400 pb-1">
                                <div class="flex items-center gap-2">
                                    <span class="text-[10px] font-black text-gray-400">$</span>
                                    <input type="number" step="0.01" name="variant_prices[]" required placeholder="Price" class="w-full text-xs font-black outline-none">
                                </div>
                            </div>
                        `;
                        variantList.appendChild(row);
                    };
                    reader.readAsDataURL(file);
                });
            }
        });
    </script>
</body>
</html>
