<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Somphea Reak Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; color: #1e293b; }
        
        .input-box { border: 2px solid #e2e8f0; border-radius: 16px; padding: 16px 20px; width: 100%; font-size: 14px; font-weight: 700; outline: none; transition: 0.2s; background: white; color: #0f172a;}
        .input-box:focus { border-color: #ff5000; box-shadow: 0 0 0 4px rgba(255, 80, 0, 0.1); }
        .input-box::placeholder { color: #94a3b8; font-weight: 600; }
        
        .btn-taobao { background: linear-gradient(90deg, #ff9000 0%, #ff5000 100%); color: white; transition: all 0.2s; }
        .btn-taobao:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(255, 80, 0, 0.2); }
        .btn-taobao:active { transform: translateY(0); }

        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .animate-slide-up { animation: slideUp 0.4s ease-out forwards; }
        
        /* Background Pattern */
        .bg-pattern {
            background-color: #f8fafc;
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 24px 24px;
        }
    </style>
</head>
<body class="bg-pattern min-h-screen flex items-center justify-center p-4">

    <!-- FLASH MESSAGES -->
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="fixed top-10 left-1/2 transform -translate-x-1/2 z-[150] flex flex-col gap-2 w-full max-w-sm pointer-events-none">
        {% for category, message in messages %}
          <div class="px-6 py-4 rounded-2xl shadow-xl text-white text-[11px] font-black tracking-widest uppercase text-center animate-slide-up {{ 'bg-red-500 shadow-red-500/20' if category == 'error' else 'bg-green-500 shadow-green-500/20' }}">
            <i class="fa-solid {{ 'fa-triangle-exclamation' if category == 'error' else 'fa-circle-check' }} mr-2"></i>
            {{ message }}
          </div>
        {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    <div class="bg-white w-full max-w-md rounded-[32px] p-8 md:p-10 shadow-2xl border border-gray-100 relative overflow-hidden">
        
        <!-- Decorative Header Design -->
        <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-orange-300 via-[#ff5000] to-orange-300"></div>
        <div class="absolute -top-10 -right-10 w-32 h-32 bg-orange-50 rounded-full blur-2xl opacity-60"></div>
        <div class="absolute -bottom-10 -left-10 w-32 h-32 bg-blue-50 rounded-full blur-2xl opacity-60"></div>

        <div class="relative z-10 flex flex-col items-center mb-8">
            <div class="w-16 h-16 bg-gray-50 rounded-2xl border border-gray-100 flex items-center justify-center mb-4 shadow-sm relative">
                <i class="fa-solid fa-lock text-2xl text-gray-800"></i>
                <div class="absolute -bottom-1 -right-1 w-6 h-6 bg-[#ff5000] rounded-full flex items-center justify-center text-white border-2 border-white">
                    <i class="fa-solid fa-shield-halved text-[10px]"></i>
                </div>
            </div>
            <h1 class="text-2xl font-black text-gray-900 tracking-tight text-center">Enterprise Admin</h1>
            <p class="text-[10px] font-bold text-gray-400 uppercase tracking-[0.2em] mt-2">Somphea Reak Studio</p>
        </div>

        <form action="/admin/login" method="POST" class="relative z-10 space-y-5">
            <div class="space-y-1.5">
                <label class="text-[10px] font-black text-gray-500 uppercase tracking-widest pl-2">Username</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <i class="fa-solid fa-user text-gray-400"></i>
                    </div>
                    <input type="text" name="username" required class="input-box pl-11" placeholder="Enter admin username">
                </div>
            </div>

            <div class="space-y-1.5">
                <label class="text-[10px] font-black text-gray-500 uppercase tracking-widest pl-2">Secure Password</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <i class="fa-solid fa-key text-gray-400"></i>
                    </div>
                    <input type="password" name="password" required class="input-box pl-11 pr-11" placeholder="••••••••••••" id="password-input">
                    <button type="button" onclick="togglePassword()" class="absolute inset-y-0 right-0 pr-4 flex items-center text-gray-400 hover:text-[#ff5000] transition-colors focus:outline-none">
                        <i class="fa-solid fa-eye" id="eye-icon"></i>
                    </button>
                </div>
            </div>

            <div class="pt-4">
                <button type="submit" class="w-full btn-taobao py-4 rounded-[16px] text-xs font-black uppercase tracking-[0.1em] flex items-center justify-center gap-2">
                    Access Dashboard <i class="fa-solid fa-arrow-right-to-bracket"></i>
                </button>
            </div>
        </form>

        <div class="mt-8 pt-6 border-t border-gray-100 text-center relative z-10">
            <p class="text-[9px] font-bold text-gray-400 flex items-center justify-center gap-1.5">
                <i class="fa-solid fa-lock text-gray-300"></i> 256-bit Encrypted Connection
            </p>
        </div>
    </div>

    <script>
        // Auto-hide flash messages after 4 seconds
        setTimeout(() => {
            document.querySelectorAll('.animate-slide-up').forEach(el => {
                el.style.opacity = '0';
                el.style.transform = 'translateY(-20px)';
                el.style.transition = 'all 0.4s ease';
                setTimeout(() => el.remove(), 400);
            });
        }, 4000);

        function togglePassword() {
            const input = document.getElementById('password-input');
            const icon = document.getElementById('eye-icon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }
    </script>
</body>
</html>
