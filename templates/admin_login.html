<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Somphea Reak | Admin Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f2f2f2; }
    </style>
</head>
<body class="h-screen flex items-center justify-center p-4">
    <div class="bg-white p-8 rounded-3xl shadow-xl w-full max-w-sm">
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-black rounded-2xl mx-auto flex items-center justify-center text-white text-2xl font-black mb-4">S</div>
            <h1 class="text-2xl font-black text-gray-900">Admin Studio</h1>
            <p class="text-xs text-gray-400 font-bold uppercase tracking-widest mt-1">Somphea Reak</p>
        </div>

        {% with messages = get_flashed_messages(category_filter=["error"]) %}
            {% if messages %}
                <div class="bg-red-50 text-red-500 text-sm font-bold p-3 rounded-xl mb-4 text-center border border-red-100">
                    {{ messages[0] }}
                </div>
            {% endif %}
        {% endwith %}

        <form method="POST" action="/admin/login" class="space-y-4">
            <div>
                <input type="password" name="password" placeholder="Enter Admin Password" required 
                    class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 text-sm font-bold focus:outline-none focus:border-orange-500 focus:bg-white transition-colors">
            </div>
            <button type="submit" class="w-full bg-black text-white font-bold rounded-xl px-4 py-3 active:scale-95 transition-transform flex justify-center items-center gap-2">
                Unlock Dashboard <i class="fa-solid fa-lock-open text-sm"></i>
            </button>
        </form>
    </div>
</body>
</html>
